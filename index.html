  { id:'interest-coverage', cat:'leverage', nameAr:'تغطية الفوائد', nameEn:'Interest Coverage Ratio', formula:'EBIT ÷ Interest Expense', unit:'x',
    explain: L2('بتقيس قدرة الشركة على سداد فوائد ديونها من أرباح التشغيل.','Measures how easily a company can pay interest on its debt from operating profit.'),
    source: L2('EBIT (الربح قبل الفوائد والضريبة) ومصروف الفوائد تلاقيهم في قائمة الدخل.','EBIT (operating income) and interest expense are both found on the Income Statement.'),
    inputs:[{id:'ebit',ar:'الربح قبل الفوائد والضريبة (EBIT)',en:'EBIT'},{id:'ie',ar:'مصروف الفوائد',en:'Interest expense'}],
    calc:v=>v.ie?v.ebit/v.ie:0,
    interpret:val=>{ const lv=ratioLevel(val,5,2); return {level:lv, ar:{good:'أرباح التشغيل تغطي الفوائد براحة كبيرة.',mid:'تغطية مقبولة، لكن مفيش هامش أمان واسع.',weak:'تغطية ضعيفة — خطورة في سداد الفوائد لو الأرباح قلّت.'}[lv], en:{good:'Operating profit covers interest with plenty of room.',mid:'Acceptable coverage, but not a wide safety margin.',weak:'Weak coverage — risk of struggling to pay interest if profits dip.'}[lv]}; } },

  { id:'lt-debt-ratio', cat:'leverage', nameAr:'نسبة الدين طويل الأجل', nameEn:'Long-term Debt Ratio', formula:'Long-term Debt ÷ (Long-term Debt + Equity)', unit:'%',
    explain: L2('نسبة التمويل طويل الأجل اللي جاي من الدين مقابل حقوق الملكية.','The share of long-term financing that comes from debt versus equity.'),
    source: L2('الديون طويلة الأجل بند في الخصوم غير المتداولة بالميزانية العمومية.','Long-term debt is listed under Non-current Liabilities on the Balance Sheet.'),
    inputs:[{id:'ltd',ar:'الدين طويل الأجل',en:'Long-term debt'},{id:'eq',ar:'حقوق الملكية',en:'Equity'}],
    calc:v=>(v.ltd+v.eq)? v.ltd/(v.ltd+v.eq)*100 : 0,
    interpret:val=>{ const lv=ratioLevel(val,30,50,false); return {level:lv, ar:{good:'تمويل طويل الأجل متحفظ ومعتمد بشكل أساسي على حقوق الملكية.',mid:'مزيج متوسط بين الدين وحقوق الملكية.',weak:'اعتماد كبير على الدين طويل الأجل في التمويل.'}[lv], en:{good:'Conservative long-term financing, mostly equity-based.',mid:'A balanced mix of debt and equity.',weak:'Heavy reliance on long-term debt for financing.'}[lv]}; } },

  { id:'roe', cat:'profitability', nameAr:'العائد على حقوق الملكية', nameEn:'ROE', formula:'Net Income ÷ Shareholders’ Equity', unit:'%',
    explain: L2('بتوضح قد إيه الشركة بتحقق ربح من كل جنيه من فلوس المساهمين.','Shows how much profit the company generates from each pound of shareholder capital.'),
    source: L2('صافي الدخل من قائمة الدخل، وحقوق الملكية من الميزانية العمومية.','Net Income from the Income Statement; Shareholders’ Equity from the Balance Sheet.'),
    inputs:[{id:'ni',ar:'صافي الدخل',en:'Net income'},{id:'eq',ar:'حقوق الملكية',en:'Equity'}],
    calc:v=>v.eq?v.ni/v.eq*100:0,
    interpret:val=>{ const lv=ratioLevel(val,15,8); return {level:lv, ar:{good:'ربحية قوية على أموال المساهمين.',mid:'ربحية متوسطة.',weak:'ربحية ضعيفة على أموال المساهمين.'}[lv], en:{good:'Strong return generated on shareholder capital.',mid:'Moderate return.',weak:'Weak return on shareholder capital.'}[lv]}; } },

  { id:'roa', cat:'profitability', nameAr:'العائد على الأصول', nameEn:'ROA', formula:'Net Income ÷ Total Assets', unit:'%',
    explain: L2('بتقيس كفاءة الشركة في استخدام أصولها لتوليد أرباح.','Measures how efficiently a company uses its assets to generate profit.'),
    source: L2('صافي الدخل من قائمة الدخل، وإجمالي الأصول من الميزانية العمومية.','Net Income from the Income Statement; Total Assets from the Balance Sheet.'),
    inputs:[{id:'ni',ar:'صافي الدخل',en:'Net income'},{id:'ta',ar:'إجمالي الأصول',en:'Total assets'}],
    calc:v=>v.ta?v.ni/v.ta*100:0,
    interpret:val=>{ const lv=ratioLevel(val,7,3); return {level:lv, ar:{good:'كفاءة عالية في استخدام الأصول لتوليد أرباح.',mid:'كفاءة متوسطة.',weak:'كفاءة ضعيفة في استغلال الأصول.'}[lv], en:{good:'High efficiency turning assets into profit.',mid:'Moderate efficiency.',weak:'Weak efficiency using assets to generate profit.'}[lv]}; } },

  { id:'roic', cat:'profitability', nameAr:'العائد على رأس المال المستثمر', nameEn:'ROIC', formula:'NOPAT ÷ Invested Capital', unit:'%',
    explain: L2('العائد اللي الشركة بتحققه على الفلوس المستثمرة فعليًا في نشاطها (دين + حقوق ملكية).','The return the company earns on capital actually invested in operations (debt + equity).'),
    source: L2('NOPAT = ربح التشغيل × (1 − معدل الضريبة) من قائمة الدخل، ورأس المال المستثمر = الدين + حقوق الملكية − النقد من الميزانية.','NOPAT = Operating Income × (1 − tax rate) from the Income Statement; Invested Capital = Debt + Equity − Cash from the Balance Sheet.'),
    inputs:[{id:'nopat',ar:'صافي ربح التشغيل بعد الضريبة (NOPAT)',en:'NOPAT'},{id:'ic',ar:'رأس المال المستثمر',en:'Invested capital'}],
    calc:v=>v.ic?v.nopat/v.ic*100:0,
    interpret:val=>{ const lv=ratioLevel(val,12,6); return {level:lv, ar:{good:'كفاءة عالية في تحقيق عائد على رأس المال المستثمر فعليًا.',mid:'عائد متوسط على رأس المال المستثمر.',weak:'عائد ضعيف على رأس المال المستثمر.'}[lv], en:{good:'High efficiency generating return on invested capital.',mid:'Moderate return on invested capital.',weak:'Weak return on invested capital.'}[lv]}; } },

  { id:'gross-margin', cat:'profitability', nameAr:'هامش الربح الإجمالي', nameEn:'Gross Margin', formula:'(Revenue − COGS) ÷ Revenue', unit:'%',
    explain: L2('النسبة المتبقية من كل جنيه مبيعات بعد تكلفة المنتج نفسه.','The share of each pound of sales left after the direct cost of the product.'),
    source: L2('الإيرادات وتكلفة المبيعات (COGS) أول بندين في قائمة الدخل.','Revenue and Cost of Goods Sold are the first two lines on the Income Statement.'),
    inputs:[{id:'rev',ar:'الإيرادات',en:'Revenue'},{id:'cogs',ar:'تكلفة المبيعات',en:'COGS'}],
    calc:v=>v.rev?(v.rev-v.cogs)/v.rev*100:0,
    interpret:val=>{ const lv=ratioLevel(val,40,20); return {level:lv, ar:{good:'هامش ربح إجمالي قوي — قوة تسعيرية جيدة.',mid:'هامش متوسط، يعتمد على طبيعة القطاع.',weak:'هامش ضعيف — تكلفة المنتج بتاكل جزء كبير من المبيعات.'}[lv], en:{good:'Strong gross margin — good pricing power.',mid:'Moderate margin, depends heavily on the industry.',weak:'Weak margin — product cost eats up a large share of sales.'}[lv]}; } },

  { id:'operating-margin', cat:'profitability', nameAr:'هامش ربح التشغيل', nameEn:'Operating Margin', formula:'Operating Income ÷ Revenue', unit:'%',
    explain: L2('ربحية النشاط الأساسي للشركة قبل الفوائد والضريبة.','Profitability of the core business before interest and taxes.'),
    source: L2('ربح التشغيل والإيرادات من قائمة الدخل.','Operating Income and Revenue from the Income Statement.'),
    inputs:[{id:'oi',ar:'ربح التشغيل',en:'Operating income'},{id:'rev',ar:'الإيرادات',en:'Revenue'}],
    calc:v=>v.rev?v.oi/v.rev*100:0,
    interpret:val=>{ const lv=ratioLevel(val,15,5); return {level:lv, ar:{good:'نشاط تشغيلي مربح بكفاءة عالية.',mid:'ربحية تشغيلية متوسطة.',weak:'ربحية تشغيلية ضعيفة.'}[lv], en:{good:'Highly efficient, profitable core operations.',mid:'Moderate operating profitability.',weak:'Weak operating profitability.'}[lv]}; } },

  { id:'net-margin', cat:'profitability', nameAr:'هامش صافي الربح', nameEn:'Net Margin', formula:'Net Income ÷ Revenue', unit:'%',
    explain: L2('قد إيه فاضل صافي ربح من كل جنيه مبيعات بعد كل المصاريف والضريبة.','How much net profit remains from every pound of sales after all costs and tax.'),
    source: L2('صافي الدخل آخر بند في قائمة الدخل، والإيرادات أول بند فيها.','Net Income is the last line of the Income Statement; Revenue is the first.'),
    inputs:[{id:'ni',ar:'صافي الدخل',en:'Net income'},{id:'rev',ar:'الإيرادات',en:'Revenue'}],
    calc:v=>v.rev?v.ni/v.rev*100:0,
    interpret:val=>{ const lv=ratioLevel(val,10,5); return {level:lv, ar:{good:'صافي ربحية قوي بعد كل المصاريف والضريبة.',mid:'صافي ربحية متوسط.',weak:'صافي ربحية ضعيف.'}[lv], en:{good:'Strong bottom-line profitability after all costs.',mid:'Moderate bottom-line profitability.',weak:'Weak bottom-line profitability.'}[lv]}; } },

  { id:'eps', cat:'profitability', nameAr:'ربحية السهم', nameEn:'EPS', formula:'Net Income ÷ Weighted Avg. Shares Outstanding', unit:'',
    explain: L2('نصيب السهم الواحد من صافي أرباح الشركة.','The portion of net profit attributable to a single share.'),
    source: L2('صافي الدخل من قائمة الدخل، وعدد الأسهم غالبًا في نفس القائمة أو في الإيضاحات.','Net Income from the Income Statement; share count is usually on the same statement or in the notes.'),
    inputs:[{id:'ni',ar:'صافي الدخل',en:'Net income'},{id:'sh',ar:'عدد الأسهم',en:'Shares outstanding'}],
    calc:v=>v.sh?v.ni/v.sh:0,
    interpret:val=>({level: val>0?'info':'weak', ar: val>0?'رقم موجب — الشركة محققة ربح لكل سهم، وبيتحسب عليه الـ P/E.':'رقم سالب — الشركة بتخسر، ومكرر الربحية ميبقاش له معنى.', en: val>0?'A positive number means the company earns profit per share — it feeds directly into the P/E ratio.':'A negative number means the company is losing money, so P/E becomes meaningless.'}) },

  { id:'pe', cat:'valuation', nameAr:'مكرر الربحية', nameEn:'P/E Ratio', formula:'Market Price per Share ÷ EPS', unit:'x',
    explain: L2('كام سنة أرباح محتاج السهم عشان يرجع رأس مالك بسعره الحالي.','How many years of current earnings it would take to recoup the share’s price.'),
    source: L2('سعر السهم من السوق مباشرة، وEPS من قائمة الدخل.','Market price comes from the exchange; EPS from the Income Statement.'),
    inputs:[{id:'price',ar:'سعر السهم',en:'Share price'},{id:'eps',ar:'ربحية السهم (EPS)',en:'EPS'}],
    calc:v=>v.eps?v.price/v.eps:0,
    interpret:val=>{ const lv = val<=0?'weak':(val<15?'good':(val<=25?'mid':'weak')); return {level:lv, ar:{good:'السهم رخيص نسبيًا مقارنة بأرباحه — يستاهل بحث أعمق.',mid:'تقييم معقول ومتوسط مقارنة بالسوق.',weak:val<=0?'الشركة خسرانة، فمكرر الربحية مش دليل هنا.':'السهم غالي نسبيًا مقارنة بأرباحه الحالية.'}[lv], en:{good:'Relatively cheap relative to earnings — worth a closer look.',mid:'A fair, middle-of-the-road valuation versus the market.',weak: val<=0?'The company is unprofitable, so P/E isn’t meaningful here.':'Relatively expensive compared to current earnings.'}[lv]}; } },

  { id:'pb', cat:'valuation', nameAr:'مكرر القيمة الدفترية', nameEn:'P/B Ratio', formula:'Market Price per Share ÷ Book Value per Share', unit:'x',
    explain: L2('بيقارن سعر السهم في السوق بالقيمة الدفترية لحقوق الملكية.','Compares the market price to the accounting (book) value of equity per share.'),
    source: L2('القيمة الدفترية = حقوق الملكية ÷ عدد الأسهم، كلاهما من الميزانية العمومية.','Book value = Equity ÷ Shares outstanding, both from the Balance Sheet.'),
    inputs:[{id:'price',ar:'سعر السهم',en:'Share price'},{id:'bvps',ar:'القيمة الدفترية للسهم',en:'Book value per share'}],
    calc:v=>v.bvps?v.price/v.bvps:0,
    interpret:val=>{ const lv = val<1?'good':(val<=3?'mid':'weak'); return {level:lv, ar:{good:'السهم بيتداول تحت قيمته الدفترية — ممكن يكون فرصة أو فيه مشكلة، يستاهل بحث.',mid:'تقييم معقول مقارنة بالقيمة الدفترية.',weak:'السهم بيتداول بعلاوة كبيرة فوق قيمته الدفترية.'}[lv], en:{good:'Trading below book value — could be a bargain or a red flag, worth investigating.',mid:'A reasonable valuation relative to book value.',weak:'Trading at a large premium above book value.'}[lv]}; } },

  { id:'ps', cat:'valuation', nameAr:'مكرر المبيعات', nameEn:'P/S Ratio', formula:'Market Capitalization ÷ Revenue', unit:'x',
    explain: L2('مفيد لتقييم الشركات اللي لسه مش بتحقق أرباح.','Useful for valuing companies that aren’t yet profitable.'),
    source: L2('القيمة السوقية = سعر السهم × عدد الأسهم، والإيرادات من قائمة الدخل.','Market cap = share price × shares outstanding; Revenue from the Income Statement.'),
    inputs:[{id:'mc',ar:'القيمة السوقية',en:'Market cap'},{id:'rev',ar:'الإيرادات',en:'Revenue'}],
    calc:v=>v.rev?v.mc/v.rev:0,
    interpret:val=>{ const lv = val<1?'good':(val<=4?'mid':'weak'); return {level:lv, ar:{good:'تقييم منخفض مقارنة بالمبيعات.',mid:'تقييم معقول مقارنة بالمبيعات.',weak:'تقييم مرتفع جدًا مقارنة بالمبيعات.'}[lv], en:{good:'A low valuation relative to sales.',mid:'A reasonable valuation relative to sales.',weak:'A very high valuation relative to sales.'}[lv]}; } },

  { id:'div-yield', cat:'valuation', nameAr:'عائد التوزيعات', nameEn:'Dividend Yield', formula:'Dividend per Share ÷ Market Price per Share', unit:'%',
    explain: L2('العائد النقدي السنوي اللي بتاخده من التوزيعات مقارنة بسعر السهم.','The annual cash return you get from dividends relative to the share price.'),
    source: L2('التوزيعات بتُعلن من الشركة أو تلاقيها في قائمة التدفقات النقدية (أنشطة التمويل).','Dividends are announced by the company or found in the Cash Flow Statement under financing activities.'),
    inputs:[{id:'dps',ar:'التوزيعات للسهم',en:'Dividend per share'},{id:'price',ar:'سعر السهم',en:'Share price'}],
    calc:v=>v.price?v.dps/v.price*100:0,
    interpret:val=>{ const lv=ratioLevel(val,4,1); return {level:lv, ar:{good:'عائد توزيعات مرتفع وجذاب لمستثمري الدخل.',mid:'عائد توزيعات متوسط.',weak:'عائد توزيعات منخفض أو معدوم.'}[lv], en:{good:'A high, attractive yield for income investors.',mid:'A moderate dividend yield.',weak:'A low or negligible dividend yield.'}[lv]}; } },

  { id:'payout-ratio', cat:'valuation', nameAr:'نسبة توزيع الأرباح', nameEn:'Payout Ratio', formula:'Dividends Paid ÷ Net Income', unit:'%',
    explain: L2('نسبة الأرباح اللي الشركة بتوزعها بدل ما تحتفظ بيها لإعادة الاستثمار.','The share of profit paid out as dividends instead of retained for reinvestment.'),
    source: L2('التوزيعات من قائمة التدفقات النقدية، وصافي الدخل من قائمة الدخل.','Dividends from the Cash Flow Statement; Net Income from the Income Statement.'),
    inputs:[{id:'div',ar:'إجمالي التوزيعات',en:'Dividends paid'},{id:'ni',ar:'صافي الدخل',en:'Net income'}],
    calc:v=>v.ni?v.div/v.ni*100:0,
    interpret:val=>{ const lv = val>100?'weak':(val<=40?'good':(val<=70?'mid':'weak')); return {level:lv, ar:{good:'نسبة توزيع متحفظة وفيها مجال كبير لإعادة الاستثمار في النمو.',mid:'توازن معقول بين التوزيعات وإعادة الاستثمار.',weak: val>100?'الشركة بتوزع أكتر من صافي ربحها — وضع غير مستدام.':'نسبة توزيع مرتفعة ومساحة قليلة لإعادة الاستثمار.'}[lv], en:{good:'A conservative payout with plenty of room to reinvest for growth.',mid:'A reasonable balance between dividends and reinvestment.',weak: val>100?'The company is paying out more than its net profit — unsustainable.':'A high payout ratio leaves little room for reinvestment.'}[lv]}; } },

  { id:'asset-turnover', cat:'efficiency', nameAr:'معدل دوران الأصول', nameEn:'Asset Turnover', formula:'Revenue ÷ Total Assets', unit:'x',
    explain: L2('بتقيس كفاءة الشركة في استخدام أصولها لتوليد مبيعات.','Measures how efficiently a company uses its assets to generate sales.'),
    source: L2('الإيرادات من قائمة الدخل، وإجمالي الأصول من الميزانية العمومية.','Revenue from the Income Statement; Total Assets from the Balance Sheet.'),
    inputs:[{id:'rev',ar:'الإيرادات',en:'Revenue'},{id:'ta',ar:'إجمالي الأصول',en:'Total assets'}],
    calc:v=>v.ta?v.rev/v.ta:0,
    interpret:val=>{ const lv=ratioLevel(val,1,0.5); return {level:lv, ar:{good:'كفاءة عالية في تحويل الأصول لمبيعات.',mid:'كفاءة متوسطة.',weak:'كفاءة ضعيفة في استغلال الأصول لتوليد مبيعات.'}[lv], en:{good:'High efficiency turning assets into sales.',mid:'Moderate efficiency.',weak:'Weak efficiency turning assets into sales.'}[lv]}; } },

  { id:'inventory-turnover', cat:'efficiency', nameAr:'معدل دوران المخزون', nameEn:'Inventory Turnover', formula:'COGS ÷ Average Inventory', unit:'x',
    explain: L2('كام مرة الشركة بتبيع وتجدد مخزونها خلال السنة.','How many times a company sells and replaces its inventory during the year.'),
    source: L2('تكلفة المبيعات من قائمة الدخل، ومتوسط المخزون من رصيد أول وآخر المدة في الميزانية العمومية.','COGS from the Income Statement; average inventory from the opening and closing balances on the Balance Sheet.'),
    inputs:[{id:'cogs',ar:'تكلفة المبيعات',en:'COGS'},{id:'avginv',ar:'متوسط المخزون',en:'Average inventory'}],
    calc:v=>v.avginv?v.cogs/v.avginv:0,
    interpret:val=>{ const lv=ratioLevel(val,6,3); return {level:lv, ar:{good:'مخزون سريع الحركة — إدارة مخزون كفؤة.',mid:'دوران مخزون متوسط.',weak:'مخزون بطيء الحركة — ممكن يشير لمشكلة في الطلب أو التسعير.'}[lv], en:{good:'Fast-moving inventory — efficient inventory management.',mid:'Moderate inventory turnover.',weak:'Slow-moving inventory — could signal demand or pricing issues.'}[lv]}; } },
];

function ratioLevelLabel(level){
  return { good:L('قوي','Strong'), mid:L('متوسط','Moderate'), weak:L('ضعيف','Weak'), info:L('معلومة','Info') }[level] || '';
}

function renderCompanyAnalysis(){
  return `
  <div class="calc-page">
    <div class="back-link" onclick="navigate('services')">${ICON.arrow} ${L('كل الأدوات','All tools')}</div>
    <div class="calc-num">${L('دليل مرجعي وتفاعلي','Interactive reference guide')}</div>
    <h1 class="calc-title">${L('تحليل الشركات','Company Analysis')}</h1>
    <p class="calc-desc">${L('أهم النسب المالية بمعادلاتها، وتحت كل واحدة تقدر تدخل أرقام الشركة اللي بتحللها وناخد لك النتيجة مع تفسير مبسط ليها.','The key financial ratios with their formulas — enter a company’s own figures under each one and get the result along with a plain-language interpretation.')}</p>
  ${RATIO_CATEGORIES.map(cat => `
    <div class="section-head" style="padding-top:24px; padding-bottom:14px">
      <h2 style="font-size:19px">${L(cat.ar, cat.en)}</h2>
    </div>
    <div class="ratio-accordion">
      ${RATIOS.filter(r=>r.cat===cat.key).map(r => `
        <div class="ratio-item reveal" id="ratio-${r.id}">
          <button class="ratio-item-head" onclick="this.closest('.ratio-item').classList.toggle('open')">
            <div class="ratio-item-name">${esc(r.nameEn)} <span class="ratio-item-ar">${esc(r.nameAr)}</span></div>
            <div class="ratio-item-chevron">${ICON.arrow}</div>
          </button>
          <div class="ratio-item-body"><div class="ratio-item-body-inner">
            <div class="ratio-formula">${esc(r.formula)}</div>
            <p class="ratio-explain">${L(r.explain.ar, r.explain.en)}</p>
            <div class="ratio-source"><strong>${L('منين تجيبها:','Where to find it:')}</strong> ${L(r.source.ar, r.source.en)}</div>
            <div class="ratio-calc">
              <div class="ratio-calc-inputs">
                ${r.inputs.map(inp => `
                  <div class="field"><label>${esc(L(inp.ar, inp.en))}</label><input type="number" id="ratioIn-${r.id}-${inp.id}"></div>`).join('')}
              </div>
              <button class="btn small" onclick="computeRatio('${r.id}')">${L('احسب النتيجة','Calculate result')}</button>
              <div class="ratio-result" id="ratioResult-${r.id}"></div>
            </div>
          </div></div>
        </div>`).join('')}
    </div>`).join('')}
  ${pageFoot()}
  `;
}
function computeRatio(id){
  const r = RATIOS.find(x=>x.id===id);
  if (!r) return;
  const vals = {};
  for (const inp of r.inputs){
    vals[inp.id] = +document.getElementById(`ratioIn-${id}-${inp.id}`).value || 0;
  }
  const result = r.calc(vals);
  const info = r.interpret(result);
  const displayVal = r.unit === '%' ? pct(result) : (r.unit === 'x' ? fmt(result)+'x' : fmt(result,0));
  document.getElementById(`ratioResult-${id}`).innerHTML = `
    <div class="ratio-result-value">${displayVal}</div>
    <div class="ratio-result-badge level-${info.level}">${ratioLevelLabel(info.level)}</div>
    <p class="ratio-result-text">${L(info.ar, info.en)}</p>`;
}
PAGES['company-analysis'] = { render: renderCompanyAnalysis };

/* ===================== RESULT SHARE CARD ===================== */
function attachShareButtons(){
  const main = document.getElementById('mainContent');
  const titleEl = main.querySelector('.calc-title');
  const toolName = titleEl ? titleEl.textContent.trim() : (LANG==='ar' ? 'النتيجة' : 'Result');
  main.querySelectorAll('.result-panel[id]').forEach(panel => {
    if (panel.nextElementSibling && panel.nextElementSibling.classList && panel.nextElementSibling.classList.contains('share-btn-wrap')) return;
    const wrap = document.createElement('div');
    wrap.className = 'share-btn-wrap';
    const btn = document.createElement('button');
    btn.className = 'share-btn';
    btn.innerHTML = `${ICON.camera} <span>${L('عرض النتيجة','Show result')}</span>`;
    btn.addEventListener('click', () => openResultCard(panel.id, toolName));
    wrap.appendChild(btn);
    panel.insertAdjacentElement('afterend', wrap);
  });
}
function openResultCard(panelId, toolName){
  const panel = document.getElementById(panelId);
  if (!panel) return;
  if (panel.querySelector('.placeholder')){
    alert(L('احسب النتيجة الأول عشان تقدر تعرضها','Calculate a result first so you can display it'));
    return;
  }
  document.getElementById('resultModalTool').textContent = toolName;

  let html = '';

  // Capture the inputs the user entered (first column of the same calc-grid, if any)
  const grid = panel.closest('.calc-grid');
  if (grid && grid.firstElementChild && grid.firstElementChild !== panel){
    const fields = grid.firstElementChild.querySelectorAll('.field');
    if (fields.length){
      let rows = '';
      fields.forEach(f=>{
        const label = f.querySelector('label');
        const input = f.querySelector('input, select');
        if (!label || !input) return;
        let val = input.tagName === 'SELECT' ? input.options[input.selectedIndex].text : input.value;
        if (val === '') val = '—';
        rows += `<div class="result-row"><span class="rl">${label.textContent}</span><span class="rv">${esc(val)}</span></div>`;
      });
      if (rows) html += `<div class="share-inputs"><div class="share-section-label">${L('البيانات اللي دخلتها','Your inputs')}</div>${rows}</div>`;
    }
  }

  html += `<div class="share-section-label">${L('النتيجة','Result')}</div>${panel.innerHTML}`;

  // Include any linked chart/table declared via data-share-extra
  if (panel.dataset.shareExtra){
    panel.dataset.shareExtra.split(',').forEach(id=>{
      const extra = document.getElementById(id.trim());
      if (extra && extra.innerHTML.trim()) html += extra.outerHTML;
    });
  }

  document.getElementById('resultModalBody').innerHTML = html;
  document.getElementById('resultModal').classList.add('active');
}
function closeResultCard(){
  document.getElementById('resultModal').classList.remove('active');
}

function initReveal(){
  const els = document.querySelectorAll('#mainContent .reveal:not(.in)');
  if (!('IntersectionObserver' in window)){ els.forEach(el=>el.classList.add('in')); return; }
  const io = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if (entry.isIntersecting){ entry.target.classList.add('in'); io.unobserve(entry.target); }
    });
  }, { threshold:0.12 });
  els.forEach(el=>io.observe(el));
}

/* ===================== SCROLL PROGRESS + BACK TO TOP ===================== */
function onScrollUpdate(){
  const doc = document.documentElement;
  const scrollTop = doc.scrollTop || document.body.scrollTop;
  const height = (doc.scrollHeight || document.body.scrollHeight) - doc.clientHeight;
  const pct = height > 0 ? Math.min(100, (scrollTop/height)*100) : 0;
  const bar = document.getElementById('scrollProgress');
  if (bar) bar.style.width = pct + '%';
  const btn = document.getElementById('backToTop');
  if (btn) btn.classList.toggle('show', scrollTop > 500);
}
window.addEventListener('scroll', onScrollUpdate, { passive: true });

/* ===================== HERO PARALLAX (desktop only) ===================== */
function initParallax(){
  const visual = document.getElementById('heroVisual');
  if (!visual) return;
  const svg = visual.querySelector('svg');
  if (!svg || !window.matchMedia('(hover:hover) and (pointer:fine)').matches) return;
  svg.style.transition = 'transform .2s ease-out';
  visual.addEventListener('mousemove', (e)=>{
    const rect = visual.getBoundingClientRect();
    const x = (e.clientX - rect.left)/rect.width - 0.5;
    const y = (e.clientY - rect.top)/rect.height - 0.5;
    svg.style.transform = `translate(${(x*14).toFixed(1)}px, ${(y*10).toFixed(1)}px)`;
  });
  visual.addEventListener('mouseleave', ()=>{ svg.style.transform = 'translate(0,0)'; });
}

/* ===================== FEATURED TOOLS FILTER ===================== */
function filterFeatured(group, btn){
  document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.querySelectorAll('.featured-grid .service-card').forEach(card=>{
    const show = group === 'all' || card.dataset.group === group;
    card.classList.toggle('featured-hidden', !show);
  });
}

/* ===================== THEME / LANG / INIT ===================== */
function toggleTheme(){
  THEME = THEME === 'night' ? 'day' : 'night';
  document.documentElement.setAttribute('data-theme', THEME);
  document.getElementById('themeBtn').innerHTML = THEME === 'night' ? ICON.sun : ICON.moon;
}
function toggleLang(){
  LANG = LANG === 'ar' ? 'en' : 'ar';
  applyStaticLang();
  renderTicker();
  renderPage();
}
function applyStaticLang(){
  document.documentElement.setAttribute('lang', LANG);
  document.documentElement.setAttribute('dir', LANG==='ar' ? 'rtl':'ltr');
  document.querySelectorAll('[data-ar]').forEach(el=>{
    el.textContent = LANG==='ar' ? el.dataset.ar : el.dataset.en;
  });
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('themeBtn').innerHTML = ICON.moon;
  applyStaticLang();
  renderTicker();
  currentPage = location.hash.replace('#','') || 'home';
  renderPage();
});
