<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="day">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Qaf Investment — دليلك الاستثماري</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root[data-theme="night"]{
  --bg:#0a0a0b; --bg-alt:#151516; --card:#131314; --text:#f4f3f0; --text-soft:#93908a;
  --border:#2a2a2b; --border-strong:#48474a; --inv:#000000; --shadow:rgba(0,0,0,.55);
  --gold:#cea968; --gold-soft:rgba(206,169,104,.14);
}
:root[data-theme="day"]{
  --bg:#faf9f6; --bg-alt:#f1efe9; --card:#ffffff; --text:#0d0c0a; --text-soft:#6b675e;
  --border:#e1ded4; --border-strong:#0d0c0a; --inv:#ffffff; --shadow:rgba(20,15,5,.09);
  --gold:#9c7a34; --gold-soft:rgba(156,122,52,.10);
}
*{box-sizing:border-box; margin:0; padding:0;}
input, select, button, textarea{font-family:inherit; font-weight:inherit; font-size:inherit; color:inherit;}
html{scroll-behavior:smooth; overflow-x:hidden;}
body{
  background:var(--bg); color:var(--text);
  font-family:'Cairo',sans-serif; font-weight:600;
  min-height:100vh; transition:background .35s ease, color .35s ease;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
.letterhead{height:3px; background:linear-gradient(90deg, transparent, var(--gold) 18%, var(--gold) 82%, transparent);}
::selection{background:var(--gold); color:#0a0a0a;}
:focus-visible{outline:2px solid var(--gold); outline-offset:2px;}
.mono{font-family:'IBM Plex Mono',monospace;}
a{color:inherit;}
button{font-family:inherit; cursor:pointer;}
input, select{font-family:inherit;}

/* ---------- Ticker strip ---------- */
.ticker-wrap{
  border-bottom:1px solid var(--border); overflow:hidden; white-space:nowrap;
  background:var(--bg-alt); padding:7px 0;
}
.ticker{display:inline-block; padding-inline-start:100%; animation:ticker 38s linear infinite;}
.ticker span{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--text-soft); margin-inline-end:48px; letter-spacing:.03em;}
@keyframes ticker{ from{transform:translateX(0);} to{transform:translateX(-100%);} }
[dir="rtl"] .ticker{padding-inline-start:0; padding-inline-end:100%;}
[dir="rtl"] @keyframes ticker{}

/* ---------- Header ---------- */
header.site{
  display:flex; align-items:center; justify-content:space-between;
  padding:20px clamp(16px,5vw,48px); border-bottom:1px solid var(--border);
  position:sticky; top:0; background:color-mix(in srgb, var(--bg) 92%, transparent);
  backdrop-filter:blur(10px); z-index:50; box-shadow:0 2px 20px var(--shadow);
}
.brand{display:flex; align-items:center; gap:12px; cursor:pointer;}
.brand-mark{
  width:40px; height:40px; border:1.5px solid var(--gold); border-radius:3px;
  display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono',monospace;
  font-weight:600; font-size:14px; color:var(--gold); letter-spacing:-.02em; position:relative;
}
.brand-mark::after{content:''; position:absolute; inset:4px; border:1px solid var(--border);}
.brand-name{font-weight:900; font-size:19px; letter-spacing:-.01em;}
.brand-sub{font-size:10px; color:var(--text-soft); letter-spacing:.16em; text-transform:uppercase; font-family:'IBM Plex Mono',monospace;}
.header-actions{display:flex; align-items:center; gap:10px;}
.pill-btn{
  border:1px solid var(--border-strong); background:transparent; color:var(--text);
  padding:8px 14px; border-radius:999px; font-size:13px; font-weight:600;
  display:flex; align-items:center; gap:6px; transition:.2s;
}
.pill-btn:hover{background:var(--text); color:var(--bg);}
.account-btn{width:38px; height:38px; padding:0; justify-content:center; border-radius:50%;}
.account-btn svg{width:16px; height:16px; flex-shrink:0;}
@media(max-width:480px){ .account-btn{width:32px; height:32px;} .account-btn svg{width:14px; height:14px;} }
.icon-btn{
  width:38px; height:38px; border-radius:50%; border:1px solid var(--border-strong);
  background:transparent; color:var(--text); display:flex; align-items:center; justify-content:center;
  transition:.2s;
}
.icon-btn:hover{background:var(--text); color:var(--bg);}
.icon-btn svg{width:17px; height:17px;}

/* ---------- Main nav (desktop pill) / dropdown (mobile) ---------- */
.main-nav{
  display:none; border:1px solid var(--border-strong); border-radius:999px; padding:4px; gap:2px;
  margin-inline-start:8px;
}
.nav-link{
  background:transparent; border:none; color:var(--text-soft); font-size:12.5px; font-weight:700;
  padding:8px 16px; border-radius:999px; transition:.2s; white-space:nowrap;
}
.nav-link:hover{color:var(--text);}
.nav-link.active{background:var(--gold); color:#0a0a0a;}
.mobile-nav-toggle{display:flex;}
.mobile-nav-dropdown{
  display:none; position:absolute; inset-inline-end:16px; top:100%; margin-top:6px; min-width:200px;
  background:var(--card); border:1px solid var(--border-strong); border-top:2px solid var(--gold);
  flex-direction:column; box-shadow:0 20px 40px var(--shadow); z-index:80;
}
.mobile-nav-dropdown.open{display:flex;}
.mobile-nav-dropdown button{
  background:transparent; border:none; color:var(--text); text-align:start; padding:13px 18px;
  font-size:13.5px; font-weight:600; border-bottom:1px solid var(--border);
}
.mobile-nav-dropdown button:last-child{border-bottom:none;}
.mobile-nav-dropdown button:hover{background:var(--bg-alt); color:var(--gold);}
.mobile-nav-dropdown button.active{color:var(--gold);}

/* ---------- Quick settings shortcuts (theme / language / currency) ---------- */
.quick-settings{
  display:flex; align-items:center; border:1px solid var(--border-strong); border-radius:999px; padding:3px; gap:2px;
}
.quick-btn{
  width:30px; height:30px; border-radius:50%; border:none; background:transparent; color:var(--text-soft);
  display:flex; align-items:center; justify-content:center; transition:.2s; flex-shrink:0;
}
.quick-btn:hover{background:var(--bg-alt); color:var(--text);}
.quick-btn svg{width:15px; height:15px;}
.quick-btn-text{width:auto; padding:0 9px; font-size:11px; font-weight:800; font-family:'IBM Plex Mono',monospace;}

.currency-dropdown{position:relative;}
.currency-menu{
  display:none; position:absolute; top:calc(100% + 10px); inset-inline-end:0; min-width:190px;
  background:var(--card); border:1px solid var(--border-strong); border-top:2px solid var(--gold);
  box-shadow:0 20px 40px var(--shadow); z-index:90; flex-direction:column; padding:4px;
}
.currency-menu.open{display:flex;}
.currency-menu-item{
  display:flex; align-items:center; gap:10px; background:transparent; border:none; color:var(--text);
  padding:10px 12px; border-radius:3px; font-size:12.5px; text-align:start; transition:.15s;
}
.currency-menu-item:hover{background:var(--bg-alt);}
.currency-menu-item.active{background:var(--gold-soft); color:var(--gold);}
.currency-menu-code{font-family:'IBM Plex Mono',monospace; font-weight:800; font-size:11.5px; width:34px; flex-shrink:0;}
.currency-menu-name{flex:1; font-weight:600;}
.currency-menu-item.active .currency-menu-name{color:var(--text);}
.currency-menu-sym{color:var(--text-soft); font-family:'IBM Plex Mono',monospace; font-size:11.5px;}

@media(min-width:900px){
  .main-nav{display:flex; align-items:center;}
  .mobile-nav-toggle, .mobile-nav-dropdown{display:none !important;}
}
@media(max-width:480px){
  header.site{padding:14px 16px;}
  .brand{gap:9px;}
  .brand-mark{width:32px; height:32px; font-size:12px;}
  .brand-name{font-size:14.5px;}
  .brand-sub{display:none;}
  .header-actions{gap:6px;}
  .quick-btn{width:27px; height:27px;}
  .quick-btn svg{width:13px; height:13px;}
  .quick-btn-text{font-size:10px; padding:0 6px;}
  .icon-btn{width:32px; height:32px;}
  .icon-btn svg{width:15px; height:15px;}
}

/* ---------- Layout ---------- */
main{max-width:1180px; margin:0 auto; padding:0 clamp(16px,5vw,48px);}
.page{display:none;}
.page.active{display:block; animation:fadein .4s ease;}
@keyframes fadein{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

/* ---------- Hero ---------- */
.hero{padding:clamp(40px,7vw,80px) 0 52px; border-bottom:1px solid var(--border); position:relative; overflow:hidden;}
.hero-eyebrow{
  font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.18em; text-transform:uppercase;
  color:var(--text-soft); margin-bottom:20px; display:flex; align-items:center; gap:10px;
}
.hero-eyebrow::before{content:''; width:22px; height:1px; background:var(--gold); display:inline-block;}
.hero h1{
  font-size:clamp(30px,5.6vw,58px); font-weight:900; line-height:1.14; letter-spacing:-.02em; max-width:18ch;
}
.hero-sub{margin-top:18px; font-size:clamp(14.5px,1.7vw,17px); color:var(--text-soft); max-width:58ch; line-height:1.7;}

.hero-visual{position:relative; margin-top:40px; width:100%; max-width:100%;}
.hero-visual svg{width:100%; height:auto; display:block; position:relative; z-index:1;}
.hero-glow{
  position:absolute; inset:-20% -10%; z-index:0; pointer-events:none;
  background:radial-gradient(closest-side, var(--gold-soft), transparent 70%);
  filter:blur(6px);
}
.hero-line{stroke-dasharray:1700; stroke-dashoffset:1700; animation:drawLine 2.4s ease forwards .2s;}
@keyframes drawLine{to{stroke-dashoffset:0;}}
.hero-dot{opacity:0; animation:popDot .5s ease forwards 2.1s;}
@keyframes popDot{from{opacity:0; transform:scale(.4);} to{opacity:1; transform:scale(1);}}

/* ---------- Economic events timeline ---------- */
.timeline-card{position:relative; z-index:1; width:100%;}
.timeline-scroll{overflow-x:hidden; padding-bottom:4px;}
.timeline-scroll svg{width:100%; height:auto; display:block;}
.tl-point{cursor:pointer; animation:popDot .4s ease backwards;}
.tl-dot{transition:r .2s ease, fill .2s ease;}
.tl-point:hover .tl-dot{fill:var(--gold);}
.tl-year-label{
  font-family:'IBM Plex Mono',monospace; font-size:9.5px; fill:var(--text-soft); transition:fill .2s ease;
}
.tl-point.active .tl-year-label{fill:var(--gold); font-weight:700;}
.timeline-detail{
  margin-top:16px; border-top:1px dashed var(--border); padding-top:14px; min-height:54px;
  display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;
}
.timeline-detail-year{font-family:'IBM Plex Mono',monospace; font-weight:800; font-size:24px; color:var(--gold); flex-shrink:0;}
.timeline-detail-text{font-size:13px; color:var(--text-soft); line-height:1.7; flex:1; min-width:200px;}

/* ---------- Inflation pulse chart ---------- */
.inflation-latest{display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; margin-bottom:10px;}
.inflation-latest-value{font-family:'IBM Plex Mono',monospace; font-weight:800; font-size:30px; color:var(--gold);}
.inflation-latest-label{font-size:12px; color:var(--text-soft);}
.infl-bar-g{cursor:pointer; animation:popDot .4s ease backwards;}
.infl-bar{fill:var(--border-strong); transition:fill .2s ease;}
.infl-bar.active{fill:var(--gold);}
.infl-bar-g:hover .infl-bar{fill:var(--gold);}
.infl-month-label{font-family:'Cairo',sans-serif; font-weight:600; font-size:10px; fill:var(--text-soft);}
.timeline-source{margin-top:12px; font-size:10.5px; color:var(--text-soft); font-family:'IBM Plex Mono',monospace;}
.timeline-detail.pop{animation:detailPop .3s ease;}
@keyframes detailPop{from{opacity:.3; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}
.timeline-more-btn{
  display:inline-flex; align-items:center; gap:6px; border:1px solid var(--border-strong); background:transparent;
  color:var(--text-soft); padding:7px 13px; border-radius:999px; font-size:12px; font-weight:600; flex-shrink:0; transition:.2s;
}
.timeline-more-btn:hover{border-color:var(--gold); color:var(--text);}
.timeline-more-btn svg{width:12px; height:12px;}

.year-event-row{display:flex; align-items:flex-start; gap:10px; padding:11px 0; border-bottom:1px dashed var(--border);}
.year-event-row:last-child{border-bottom:none;}
.year-event-tag{
  flex-shrink:0; font-size:10.5px; font-weight:700; padding:3px 9px; border-radius:999px; border:1px solid var(--border-strong);
  font-family:'IBM Plex Mono',monospace; white-space:nowrap; margin-top:1px;
}
.year-event-tag.tag-eg{color:var(--gold); border-color:var(--gold);}
.year-event-tag.tag-arab{color:var(--text);}
.year-event-tag.tag-global{color:var(--text-soft);}
.year-event-text{font-size:13px; color:var(--text-soft); line-height:1.6;}

@media(max-width:700px){
  .timeline-scroll{
    overflow-x:auto; -webkit-overflow-scrolling:touch;
    scrollbar-width:thin; scrollbar-color:var(--gold) var(--bg-alt);
  }
  .timeline-scroll svg{width:auto; height:150px;}
  .timeline-scroll::-webkit-scrollbar{height:6px;}
  .timeline-scroll::-webkit-scrollbar-track{background:var(--bg-alt); border-radius:999px;}
  .timeline-scroll::-webkit-scrollbar-thumb{background:var(--gold); border-radius:999px;}
}

.hero-pattern{
  position:absolute; inset:0; z-index:0; pointer-events:none; opacity:.5;
  background-image:radial-gradient(var(--border-strong) 1px, transparent 1px);
  background-size:26px 26px;
  -webkit-mask-image:radial-gradient(ellipse 70% 60% at 30% 20%, #000 0%, transparent 75%);
  mask-image:radial-gradient(ellipse 70% 60% at 30% 20%, #000 0%, transparent 75%);
}
:root[data-theme="day"] .hero-pattern{opacity:.35;}
.hero > *:not(.hero-pattern){position:relative; z-index:1;}

.hero-cta{display:flex; flex-wrap:wrap; gap:12px; margin-top:30px;}

/* ---------- Stat bar ---------- */
.stat-bar{
  display:flex; flex-wrap:wrap; margin-top:44px; border-top:1px solid var(--border); border-bottom:1px solid var(--border);
}
.stat-item{
  flex:1; min-width:110px; padding:18px 14px; text-align:center; border-inline-end:1px solid var(--border);
}
.stat-item:last-child{border-inline-end:none;}
.stat-num{font-family:'IBM Plex Mono',monospace; font-weight:800; font-size:clamp(22px,3.4vw,32px); color:var(--gold); line-height:1;}
.stat-label{font-size:11.5px; color:var(--text-soft); margin-top:6px; letter-spacing:.03em;}

/* ---------- How it works steps ---------- */
.steps-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; margin-bottom:56px;}
.step-card{border:1px solid var(--border); background:var(--card); padding:22px 20px; position:relative;}
.step-num{
  font-family:'IBM Plex Mono',monospace; font-weight:800; font-size:34px; color:var(--border-strong);
  line-height:1; margin-bottom:8px;
}
.step-icon{width:26px; height:26px; color:var(--gold); margin-bottom:12px;}
.step-icon svg{width:100%; height:100%;}
.step-title{font-weight:700; font-size:14.5px; margin-bottom:6px;}
.step-text{font-size:12.5px; color:var(--text-soft); line-height:1.6;}

/* ---------- Scroll progress + back to top ---------- */
.scroll-progress{position:fixed; top:0; inset-inline-start:0; height:2.5px; background:var(--gold); width:0%; z-index:300; transition:width .1s linear;}
.back-to-top{
  position:fixed; bottom:22px; inset-inline-end:22px; width:44px; height:44px; border-radius:50%;
  background:var(--text); color:var(--bg); border:1px solid var(--border-strong); display:flex; align-items:center;
  justify-content:center; opacity:0; visibility:hidden; transform:translateY(10px); transition:.25s ease; z-index:150;
  box-shadow:0 10px 24px var(--shadow);
}
.back-to-top.show{opacity:1; visibility:visible; transform:translateY(0);}
.back-to-top svg{width:18px; height:18px;}

/* ---------- Featured tool filter tabs ---------- */
.mode-toggle{
  display:inline-flex; border:1px solid var(--border-strong); border-radius:999px; padding:4px; margin-bottom:22px; gap:4px;
}
.mode-toggle-btn{
  background:transparent; border:none; color:var(--text-soft); padding:9px 20px; border-radius:999px;
  font-size:13px; font-weight:700; transition:.2s;
}
.mode-toggle-btn.active{background:var(--gold); color:#0a0a0a;}

/* ---------- Tips grid ---------- */
.tips-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:16px; margin-bottom:56px;}
.tip-card{
  border:1px solid var(--border); background:var(--card); padding:20px; display:flex; gap:14px; align-items:flex-start;
  border-top:2px solid var(--gold);
}
.tip-icon{width:30px; height:30px; flex-shrink:0; border-radius:50%; border:1px solid var(--border-strong); display:flex; align-items:center; justify-content:center; color:var(--gold);}
.tip-icon svg{width:15px; height:15px;}
.tip-text{font-size:13.5px; line-height:1.7; color:var(--text-soft);}

/* ---------- Legendary investors quote cards ---------- */
.legends-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:16px; margin-bottom:56px;}
.legend-card{
  border:1px solid var(--border); background:var(--card); border-top:2px solid var(--gold);
  padding:24px; box-shadow:0 10px 26px var(--shadow);
}
.legend-portrait{
  width:88px; height:88px; border-radius:50%; border:2px solid var(--gold); position:relative;
  display:flex; align-items:center; justify-content:center; margin-bottom:16px; background:var(--bg-alt);
  overflow:hidden;
}
.legend-portrait-icon{width:52px; height:52px; color:var(--text-soft); opacity:.8;}
.legend-portrait-icon svg{width:100%; height:100%;}
.legend-portrait-initials{
  position:absolute; inset-inline-end:-3px; bottom:-3px; width:30px; height:30px; border-radius:50%;
  background:var(--gold); color:var(--bg); font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:11px;
  display:flex; align-items:center; justify-content:center; border:2px solid var(--card);
}
.legend-info{margin-bottom:16px;}
.legend-name{font-weight:800; font-size:15px;}
.legend-title{font-size:11.5px; color:var(--text-soft); margin-top:2px;}
.legend-quote{
  border-inline-start:2px solid var(--gold); padding-inline-start:14px; font-size:14px; line-height:1.75;
  color:var(--text); font-style:normal; margin:0;
}
.blog-soon-box{
  margin-top:40px; border:1px dashed var(--border-strong); padding:60px 20px; text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:16px;
}
.blog-soon-icon{width:44px; height:44px; color:var(--gold); opacity:.7;}
.blog-soon-icon svg{width:100%; height:100%;}
.blog-soon-text{font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:var(--text-soft);}

/* ---------- Auth page ---------- */
.auth-card{
  max-width:420px; margin:0 auto; border:1px solid var(--border-strong); border-top:3px solid var(--gold);
  background:var(--card); padding:32px clamp(20px,4vw,32px); box-shadow:0 14px 34px var(--shadow); text-align:center;
}
.auth-card-mark{
  width:44px; height:44px; margin:0 auto 18px; border:1.5px solid var(--gold); color:var(--gold); border-radius:3px;
  display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:15px;
}
.auth-title{font-size:19px; font-weight:900; margin-bottom:8px;}
.auth-sub{font-size:12.5px; color:var(--text-soft); line-height:1.6; margin-bottom:24px;}
.auth-social-btn{
  width:100%; display:flex; align-items:center; justify-content:center; gap:10px; border:1px solid var(--border-strong);
  background:var(--bg); color:var(--text); padding:12px; border-radius:4px; font-size:13.5px; font-weight:600;
  margin-bottom:10px; transition:.2s;
}
.auth-social-btn:hover{border-color:var(--gold); background:var(--bg-alt);}
.auth-divider{display:flex; align-items:center; gap:10px; margin:18px 0; color:var(--text-soft); font-size:11.5px;}
.auth-divider::before, .auth-divider::after{content:''; flex:1; height:1px; background:var(--border);}
.auth-card .field{text-align:start;}
.soon-note{
  margin-top:20px; display:flex; align-items:center; gap:8px; font-size:11.5px; color:var(--text-soft);
  border-top:1px dashed var(--border); padding-top:16px; text-align:start; line-height:1.6;
}
.soon-note svg{width:15px; height:15px; flex-shrink:0; color:var(--gold);}

/* ---------- Scroll reveal ---------- */
.reveal{opacity:0; transform:translateY(18px); transition:opacity .6s cubic-bezier(.2,.7,.3,1), transform .6s cubic-bezier(.2,.7,.3,1);}
.reveal.in{opacity:1; transform:translateY(0);}
@media (prefers-reduced-motion: reduce){
  .reveal{transition:none; opacity:1; transform:none;}
}

/* ---------- Educational chart ---------- */
.edu-chart{border:1px solid var(--border); border-top:2px solid var(--gold); background:var(--card); padding:clamp(20px,3vw,32px); margin-bottom:56px;}
.edu-chart-note{font-size:13px; color:var(--text-soft); line-height:1.7; margin-bottom:18px;}
.edu-bars{display:flex; flex-direction:column; gap:18px; margin-bottom:6px;}
.edu-bar-row{display:grid; grid-template-columns:1fr; gap:8px;}
.edu-bar-label{font-size:12.5px; font-weight:600; color:var(--text-soft);}
.edu-bar-track{height:16px; background:var(--bg-alt); border:1px solid var(--border);}
.edu-bar-fill{height:100%; background:var(--text-soft); transition:width 1s ease;}
.edu-bar-fill.gold{background:var(--gold);}
.edu-bar-value{font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:15px; color:var(--text);}

];

function inflationChartSVG(){
  const w = 640, h = 190, padX = 20, padTop = 20, plotH = 110, baseY = padTop + plotH;
  const maxV = Math.max(...INFLATION_DATA.map(d=>d.v));
  const barW = (w - padX*2) / INFLATION_DATA.length;
  const bars = INFLATION_DATA.map((d,i)=>{
    const bh = (d.v/maxV) * plotH;
    const x = padX + i*barW;
    const y = baseY - bh;
    const isSel = i === INFLATION_SELECTED;
    const delay = (i*0.06).toFixed(2);
    return `
    <g class="infl-bar-g" data-idx="${i}" onclick="selectInflationMonth(${i})" style="animation-delay:${delay}s">
      <rect x="${x+barW*0.18}" y="${padTop}" width="${barW*0.64}" height="${plotH}" fill="transparent"/>
      <rect class="infl-bar ${isSel?'active':''}" x="${x+barW*0.18}" y="${y}" width="${barW*0.64}" height="${bh}" rx="2"/>
      <text x="${x+barW/2}" y="${h-4}" text-anchor="middle" class="infl-month-label">${L(d.short.ar, d.short.en)}</text>
    </g>`;
  }).join('');
  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" width="100%" height="auto">${bars}</svg>`;
}

function renderInflationPulse(){
  const latest = INFLATION_DATA[INFLATION_DATA.length-1];
  return `
  <div class="section-head">
    <div class="kicker">${L('نبض الاقتصاد','Economic pulse')}</div>
    <h2>${L('معدل التضخم في مصر آخر 7 شهور','Egypt’s inflation rate — last 7 months')}</h2>
  </div>
  <div class="timeline-card">
    <div class="inflation-latest">
      <div class="inflation-latest-value">${latest.v}%</div>
      <div class="inflation-latest-label">${L('آخر تحديث —','Latest —')} ${L(latest.m.ar, latest.m.en)} · ${L('التضخم السنوي الحضري','annual urban headline inflation')}</div>
    </div>
    <div class="timeline-scroll">${inflationChartSVG()}</div>
    <div class="timeline-detail" id="inflationDetail"></div>
    <div class="timeline-source">${L('المصدر: الجهاز المركزي للتعبئة العامة والإحصاء (CAPMAS)','Source: Central Agency for Public Mobilization and Statistics (CAPMAS)')}</div>
  </div>
  `;
}
function selectInflationMonth(idx){
  INFLATION_SELECTED = idx;
  document.querySelectorAll('.infl-bar').forEach((el,i)=>{
    el.classList.toggle('active', i===idx);
  });
  const d = INFLATION_DATA[idx];
  const detail = document.getElementById('inflationDetail');
  if (detail){
    detail.innerHTML = `<div class="timeline-detail-year">${d.v}%</div><div class="timeline-detail-text">${L(d.m.ar, d.m.en)} — ${L('معدل التضخم السنوي في المناطق الحضرية','annual urban inflation rate')}</div>`;
    detail.classList.remove('pop'); void detail.offsetWidth; detail.classList.add('pop');
  }
}

function economicTimelineSVG(){
  const years = Object.keys(ECONOMIC_EVENTS).map(Number);
  const yVals = [45,60,55,48,42,38,35,40,85,65,55,70,65,58,50,42,60,50,40,35,88,55,68,60,40,25];
  const n = years.length;
  const stepX = 44, padX = 24, w = padX*2 + stepX*(n-1), h = 150, topPad = 18, plotH = 100;
  const pts = years.map((y,i)=>{
    const x = padX + i*stepX;
    const yy = topPad + (yVals[i]/100)*plotH;
    return { x, y: yy, year: y };
  });
  const path = pts.map((p,i)=> (i===0?'M':'L') + p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' ');
  const dots = pts.map((p,i)=>{
    const isActive = p.year === TIMELINE_SELECTED;
    const delay = (i*0.03).toFixed(2);
    return `
    <g class="tl-point ${isActive?'active':''}" data-year="${p.year}" onclick="selectTimelineYear(${p.year})" style="animation-delay:${delay}s">
      <circle cx="${p.x}" cy="${p.y}" r="14" fill="transparent"/>
      <circle class="tl-dot" cx="${p.x}" cy="${p.y}" r="${isActive?6:4}" fill="${isActive?'var(--gold)':'var(--card)'}" stroke="var(--gold)" stroke-width="2"/>
      <text x="${p.x}" y="${h-6}" text-anchor="middle" class="tl-year-label">${p.year}</text>
    </g>`;
  }).join('');
  return { w, h, svg: `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}">
    <path class="hero-line" d="${path}" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
  </svg>` };
}

function renderEconomicTimeline(){
  const { svg } = economicTimelineSVG();
  return `
  <div class="timeline-card">
    <div class="timeline-scroll"><div id="timelineSvgWrap">${svg}</div></div>
    <div class="timeline-detail" id="timelineDetail"></div>
  </div>`;
}
function selectTimelineYear(year){
  TIMELINE_SELECTED = year;
  document.querySelectorAll('.tl-point').forEach(el=>{
    const isActive = +el.dataset.year === year;
    el.classList.toggle('active', isActive);
    const dot = el.querySelector('.tl-dot');
    dot.setAttribute('r', isActive ? 6 : 4);
    dot.setAttribute('fill', isActive ? 'var(--gold)' : 'var(--card)');
  });
  const ev = ECONOMIC_EVENTS[year];
  const detail = document.getElementById('timelineDetail');
  if (detail && ev){
    detail.innerHTML = `
      <div class="timeline-detail-year">${year}</div>
      <div class="timeline-detail-text">${L(ev.ar, ev.en)}</div>
      <button class="timeline-more-btn" onclick="openYearEvents(${year})" aria-label="more">
        ${ICON.plus}<span>${L('المزيد','More')}</span>
      </button>`;
    detail.classList.remove('pop'); void detail.offsetWidth; detail.classList.add('pop');
  }
}

function openYearEvents(year){
  const list = EVENT_DETAILS[year];
  if (!list) return;
  document.getElementById('yearEventsYear').textContent = year;
  document.getElementById('yearEventsBody').innerHTML = list.map(ev => `
    <div class="year-event-row">
      <span class="year-event-tag tag-${ev.tag}">${L(EVENT_TAG_LABEL[ev.tag].ar, EVENT_TAG_LABEL[ev.tag].en)}</span>
      <span class="year-event-text">${L(ev.ar, ev.en)}</span>
    </div>`).join('');
  document.getElementById('yearEventsModal').classList.add('active');
}
function closeYearEvents(){
  document.getElementById('yearEventsModal').classList.remove('active');
}

function fvSeries(P, PMT, annualRate, years){
  const i = annualRate/100/12, n = years*12;
  const fv = P*Math.pow(1+i, n) + (i===0 ? PMT*n : PMT*((Math.pow(1+i,n)-1)/i));
  const invested = P + PMT*n;
  return { fv, invested, profit: fv-invested };
}

function calc1_main(){
  const P = +document.getElementById('c1_p').value || 0;
  const PMT = +document.getElementById('c1_pmt').value || 0;
  const n = +document.getElementById('c1_n').value || 0;
  const r = +document.getElementById('c1_r').value || 0;
  const { fv, invested, profit } = fvSeries(P, PMT, r, n);
  document.getElementById('c1_out').innerHTML = `
    <div class="result-headline">${fmtC(fv,0)}</div>
    <div class="result-sub">${L('القيمة المستقبلية المتوقعة','Projected future value')}</div>
    <div class="result-row"><span class="rl">${L('إجمالي المبلغ المستثمر','Total capital invested')}</span><span class="rv">${fmtC(invested,0)}</span></div>
    <div class="result-row"><span class="rl">${L('صافي الربح','Net profit')}</span><span class="rv">${fmtC(profit,0)}</span></div>
    <div class="result-row"><span class="rl">${L('نسبة النمو الإجمالية','Total growth')}</span><span class="rv">${pct(invested?(profit/invested*100):0)}</span></div>
    <div class="formula-box">FV = P(1+i)^n + PMT × [((1+i)^n − 1)/i]${L('  — i: العائد الشهري، n: عدد الشهور',' — i: monthly rate, n: number of months')}</div>`;
}

function calc1_stocks(){
  const amt = +document.getElementById('c1b_amt').value||0;
  const bc = +document.getElementById('c1b_bc').value||0;
  const sc = +document.getElementById('c1b_sc').value||0;
  const fee = +document.getElementById('c1b_fee').value||0;
  const divY = +document.getElementById('c1b_div').value||0;
  const tax = +document.getElementById('c1b_tax').value||0;
  const ret = +document.getElementById('c1b_ret').value||0;
  const years = +document.getElementById('c1b_n').value||1;

  const actualCapital = amt * (1 + bc/100);
  const netAnnualGrowth = (ret - fee)/100;
  const grossExitValue = amt * Math.pow(1+netAnnualGrowth, years);
  const netSaleValue = grossExitValue * (1 - sc/100);
  const capitalGain = netSaleValue - actualCapital;
  const totalDividendsGross = amt * (divY/100) * years;
  const netDividends = totalDividendsGross * (1 - tax/100);
  const cagr = (Math.pow(netSaleValue/actualCapital, 1/years) - 1) * 100;

  document.getElementById('c1b_out').innerHTML = `
    <div class="result-headline">${fmtC(netSaleValue + netDividends,0)}</div>
    <div class="result-sub">${L('إجمالي العائد المتوقع (بيع + توزيعات)','Total expected return (sale + dividends)')}</div>
    <div class="result-row"><span class="rl">${L('رأس المال الفعلي (شامل العمولة)','Actual capital (incl. commission)')}</span><span class="rv">${fmtC(actualCapital,0)}</span></div>
    <div class="result-row"><span class="rl">${L('صافي قيمة البيع','Net sale value')}</span><span class="rv">${fmtC(netSaleValue,0)}</span></div>
    <div class="result-row"><span class="rl">${L('الربح/الخسارة الرأسمالية','Capital gain/loss')}</span><span class="rv">${fmtC(capitalGain,0)}</span></div>
    <div class="result-row"><span class="rl">${L('صافي التوزيعات بعد الضريبة','Net dividends after tax')}</span><span class="rv">${fmtC(netDividends,0)}</span></div>
    <div class="result-row"><span class="rl">CAGR</span><span class="rv">${pct(cagr)}</span></div>
    <div class="formula-box">CAGR = (${L('القيمة النهائية/رأس المال','End value / capital')})^(1/n) − 1</div>`;
}

function calc1_bonds(){
  const face = +document.getElementById('c1c_face').value||0;
  const price = +document.getElementById('c1c_price').value||1;
  const couponRate = +document.getElementById('c1c_coupon').value||0;
  const years = +document.getElementById('c1c_years').value||1;
  const tax = +document.getElementById('c1c_tax').value||0;
  const inf = +document.getElementById('c1c_inf').value||0;

  const couponAmt = face * couponRate/100;
  const currentYield = (couponAmt/price)*100;
  const ytm = ((couponAmt + (face-price)/years) / ((face+price)/2)) * 100;
  const realYield = ((1+ytm/100)/(1+inf/100) - 1) * 100;
  const capGain = face - price;

  let pvSum = 0, weightedSum = 0;
  const y = ytm/100;
  let rows = '';
  for (let t=1; t<=years; t++){
    const cf = t===years ? couponAmt + face : couponAmt;
    const pv = cf / Math.pow(1+y, t);
    pvSum += pv;
    weightedSum += t*pv;
    const netCoupon = couponAmt*(1-tax/100);
    rows += `<tr><td>${t}</td><td>${fmt(couponAmt,0)}</td><td>${fmt(couponAmt*tax/100,0)}</td><td>${fmt(netCoupon,0)}</td><td>${fmtC(pv,0)}</td></tr>`;
  }
  const macaulay = weightedSum/pvSum;
  const modDuration = macaulay/(1+y);

  document.getElementById('c1c_out').innerHTML = `
    <div class="result-headline">${pct(ytm)}</div>
    <div class="result-sub">YTM — ${L('العائد حتى الاستحقاق (تقريبي)','Yield to maturity (approx.)')}</div>
    <div class="result-row"><span class="rl">${L('العائد الجاري (Current Yield)','Current yield')}</span><span class="rv">${pct(currentYield)}</span></div>
    <div class="result-row"><span class="rl">${L('العائد الحقيقي بعد التضخم','Real yield after inflation')}</span><span class="rv">${pct(realYield)}</span></div>
    <div class="result-row"><span class="rl">${L('الربح/الخسارة الرأسمالية عند الاستحقاق','Capital gain/loss at maturity')}</span><span class="rv">${fmtC(capGain,0)}</span></div>
    <div class="result-row"><span class="rl">Macaulay Duration</span><span class="rv">${fmt(macaulay)} ${L('سنة','yrs')}</span></div>
    <div class="result-row"><span class="rl">Modified Duration</span><span class="rv">${fmt(modDuration)}</span></div>
    <div class="table-wrap"><table><thead><tr><th>${L('سنة','Year')}</th><th>${L('كوبون','Coupon')}</th><th>${L('ضريبة','Tax')}</th><th>${L('صافي','Net')}</th><th>PV</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function calc2_future(){

  const years = +document.getElementById('c2a_years').value||0;
  const rate = +document.getElementById('c2a_rate').value||0;
  const futureValue = amt/Math.pow(1+rate/100, years);

  document.getElementById('c2a_out').innerHTML = `
    <div class="result-headline">${fmtC(futureValue,0)}</div>

function c2_setMode(mode){
  c2_mode = mode;
  document.getElementById('c2_chip_avg').classList.toggle('active', mode==='avg');
  document.getElementById('c2_chip_each').classList.toggle('active', mode==='each');
  document.getElementById('c2_avgWrap').style.display = mode==='avg' ? 'block':'none';
  document.getElementById('c2_eachWrap').style.display = mode==='each' ? 'block':'none';

}
function c2_rebuildYearRows(){
  const years = Math.max(1, Math.min(60, +document.getElementById('c2b_years').value||1));
  const wrap = document.getElementById('c2_eachWrap');
  const now = new Date().getFullYear();
  let html = '';
  for (let k=0;k<years;k++){
    const yr = now - years + k + 1;
    html += `<div class="field"><label>${L('نسبة تضخم','Inflation rate')} ${yr}</label><input type="number" class="c2_yr" placeholder="18"></div>`;
  }
  wrap.innerHTML = html;
}
function calc2_hist(){
  const amt = +document.getElementById('c2b_amt').value||0;
  const years = +document.getElementById('c2b_years').value||0;
  let factor = 1;
  if (c2_mode === 'avg'){
    const rate = +document.getElementById('c2b_avgrate').value||0;
    factor = Math.pow(1+rate/100, years);
  } else {
    document.querySelectorAll('.c2_yr').forEach(inp => { factor *= (1 + (+inp.value||0)/100); });
  }
  const todayValue = amt/factor;
  const loss = amt - todayValue;
  document.getElementById('c2b_out').innerHTML = `
    <div class="result-headline">${fmtC(todayValue,0)}</div>
    <div class="result-sub">${L('القوة الشرائية الحقيقية للمبلغ اليوم','What that amount is really worth today')}</div>

}

function c2c_add(){

  c2c_items.push({name, oldP, newP});

}
function c2c_remove(idx){ c2c_items.splice(idx,1); c2c_render(); }
function c2c_render(){
  c2c_renderForm();
  let rows = '', sumOld = 0, sumNew = 0;
  c2c_items.forEach((it, idx)=>{
    const chg = it.oldP ? (it.newP-it.oldP)/it.oldP*100 : 0;
    sumOld += it.oldP; sumNew += it.newP;
    rows += `<tr><td style="font-family:'Cairo',sans-serif">${esc(it.name)}</td><td>${fmtC(it.oldP,0)}</td><td>${fmtC(it.newP,0)}</td><td>${pct(chg)}</td><td><button class="remove-x" onclick="c2c_remove(${idx})">×</button></td></tr>`;

    out.innerHTML = `<div class="placeholder">${L('ضيف منتج واحد على الأقل','Add at least one product')}</div>`;
    return;
  }
  const personalRate = sumOld ? (sumNew-sumOld)/sumOld*100 : 0;
  out.innerHTML = `
    <div class="result-headline">${pct(personalRate)}</div>
    <div class="result-sub">${L('معدل التضخم الشخصي بناءً على سلة مشترياتك','Your personal inflation rate based on your basket')}</div>

        <select id="c3_freq"><option value="monthly">${L('شهري','Monthly')}</option><option value="yearly">${L('سنوي','Yearly')}</option></select>
      </div>

      <div class="field"><label>${L('الهدف','Target amount')}</label><input type="number" id="c3_target" placeholder="1000000"></div>

    </div>

  </div>
  ` + pageFoot();
}
function calc3_run(){
  const P = +document.getElementById('c3_p').value||0;
  const freq = document.getElementById('c3_freq').value;
  const pmtIn = +document.getElementById('c3_pmt').value||0;
  const r = +document.getElementById('c3_r').value||0;
  const target = +document.getElementById('c3_target').value||1000000;

  const i = r/100/12;
  const monthlyPMT = freq==='monthly' ? pmtIn : pmtIn/12;
  let bal = P, months = 0;
  const capMonths = 1200;
  while (bal < target && months < capMonths){
    bal = bal*(1+i) + monthlyPMT;
    months++;
  }
  const out = document.getElementById('c3_out');
  if (months >= capMonths && bal < target){
    out.innerHTML = `<div class="result-headline">100+ ${L('سنة','yrs')}</div><div class="result-sub">${L('بالمعدل ده مش هتوصل للهدف في وقت معقول — جرّب تزوّد المبلغ الشهري أو العائد المتوقع.','At this rate you won’t reach the target within a reasonable time — try a higher contribution or return.')}</div>`;
    return;
  }
  const years = Math.floor(months/12), rem = months%12;
  out.innerHTML = `
    <div class="result-headline">${years} ${L('سنة و','y')} ${rem} ${L('شهر','mo')}</div>
    <div class="result-sub">${L('الوقت المتوقع للوصول لـ','Estimated time to reach')} ${fmt(target,0)}</div>
    <div class="result-row"><span class="rl">${L('إجمالي عدد الشهور','Total months')}</span><span class="rv">${months}</span></div>
    <div class="result-row"><span class="rl">${L('الرصيد التقريبي عند الوصول','Approx. balance reached')}</span><span class="rv">${fmtC(bal,0)}</span></div>`;
}

function calc5_run(){
  const age = +document.getElementById('c5_age').value||30;
  const stocks100 = Math.max(10, Math.min(95, 100-age));
  const stocks120 = Math.max(10, Math.min(95, 120-age));
  let conservative, aggressive;
  if (age < 30){ conservative = {stocks:70, alt:20, cash:10}; aggressive = {stocks:90, alt:5, cash:5}; }
  else if (age < 45){ conservative = {stocks:55, alt:35, cash:10}; aggressive = {stocks:80, alt:15, cash:5}; }
  else if (age < 60){ conservative = {stocks:40, alt:45, cash:15}; aggressive = {stocks:65, alt:25, cash:10}; }
  else { conservative = {stocks:25, alt:50, cash:25}; aggressive = {stocks:45, alt:35, cash:20}; }

  const row = (label, s, altv, c) => `<tr><td>${label}</td><td>${fmt(s,0)}%</td><td>${fmt(altv,0)}%</td><td>${fmt(c,0)}%</td></tr>`;

      ${row(L('محافظة','Conservative'), conservative.stocks, conservative.alt, conservative.cash)}
      ${row(L('جريئة','Aggressive'), aggressive.stocks, aggressive.alt, aggressive.cash)}
    </tbody></table></div>`;
}

        <div class="field"><label>P/E</label><input type="number" id="c8_pe" placeholder="14"></div>

function calc8_run(){
  const pe = +document.getElementById('c8_pe').value||0;
  const roe = +document.getElementById('c8_roe').value||0;
  const de = +document.getElementById('c8_de').value||0;
  const cr = +document.getElementById('c8_cr').value||0;

  const score1 = pe>0 && pe<=20 ? 1 : (pe>20 && pe<=30 ? 0.5 : 0);
  const score2 = roe>=15 ? 1 : (roe>=8 ? 0.5 : 0);
  const score3 = de<=1 ? 1 : (de<=2 ? 0.5 : 0);
  const score4 = cr>=1.5 ? 1 : (cr>=1 ? 0.5 : 0);
  const total = (score1+score2+score3+score4)/4;

  let verdict, color;
  if (total>=0.75){ verdict = L('سهم قوي على الورق','Strong on paper'); }

function calc10_dcf(){
  const fcf0 = +document.getElementById('c10a_fcf').value||0;
  const g = +document.getElementById('c10a_g').value/100||0;
  const disc = +document.getElementById('c10a_disc').value/100||0.01;
  const tg = +document.getElementById('c10a_tg').value/100||0;
  const shares = +document.getElementById('c10a_shares').value||1;

  let pv = 0, fcf = fcf0;
  for (let t=1;t<=5;t++){ fcf = fcf*(1+g); pv += fcf/Math.pow(1+disc,t); }
  const terminalValue = (fcf*(1+tg))/(disc-tg);
  const pvTerminal = terminalValue/Math.pow(1+disc,5);
  const totalValue = pv+pvTerminal;
  const perShare = totalValue/shares;

  document.getElementById('c10a_out').innerHTML = `
    <div class="result-headline">${fmtC(perShare)}</div>
    <div class="result-sub">${L('القيمة العادلة للسهم بطريقة DCF','Fair value per share (DCF)')}</div>
    <div class="result-row"><span class="rl">${L('القيمة الحالية للتدفقات (5 سنين)','PV of 5-year cash flows')}</span><span class="rv">${fmtC(pv,0)}</span></div>
    <div class="result-row"><span class="rl">${L('القيمة النهائية المخصومة','Discounted terminal value')}</span><span class="rv">${fmtC(pvTerminal,0)}</span></div>
    <div class="result-row"><span class="rl">${L('إجمالي القيمة','Total value')}</span><span class="rv">${fmtC(totalValue,0)}</span></div>
    <div class="formula-box">TV = FCF₅×(1+g_t) / (r − g_t)${L('  — يُخصم بمعدل r لكل سنة',' — discounted at rate r each year')}</div>`;
}
function calc10_graham(){
  const eps = +document.getElementById('c10b_eps').value||0;
  const g = +document.getElementById('c10b_g').value||0;
  const y = +document.getElementById('c10b_y').value||4.4;
  const value = (eps*(8.5+2*g)*4.4)/y;
  document.getElementById('c10b_out').innerHTML = `
    <div class="result-headline">${fmtC(value)}</div>
    <div class="result-sub">${L('القيمة العادلة بمعادلة جراهام','Fair value (Graham formula)')}</div>
    <div class="formula-box">V = EPS × (8.5 + 2g) × 4.4 / Y</div>`;
}
function calc10_pe(){
  const eps = +document.getElementById('c10c_eps').value||0;
  const pe = +document.getElementById('c10c_pe').value||0;
  const value = eps*pe;
  document.getElementById('c10c_out').innerHTML = `

    <div class="result-sub">${L('القيمة العادلة بمقارنة P/E','Fair value (P/E comparison)')}</div>

}

PAGES.calc11 = { render: renderCalc11 };
function renderCalc11(){
  return pageHead(10,

    'Enter what you add to your savings each month, and we’ll show you the nest egg you’ll reach at retirement, whether it’s enough, and how much you can withdraw monthly afterward, across a few strategies.'
  ) + `
  <div class="calc-grid">
    <div>
      <div class="row2">
        <div class="field"><label>${L('عمرك الحالي','Current age')}</label><input type="number" id="c11_age" placeholder="30"></div>

      </div>
      <div class="row2">
        <div class="field"><label>${L('العائد السنوي المتوقع %','Expected annual return %')}</label><input type="number" id="c11_r" placeholder="10"></div>

      </div>
      <div class="field"><label>${L('عدد سنين التقاعد المتوقعة','Expected years in retirement')}</label><input type="number" id="c11_yrs" placeholder="20"></div>
      <button class="btn" onclick="calc11_run()">${L('احسب','Calculate')}</button>
    </div>
    <div class="result-panel" id="c11_out"><div class="placeholder">${L('النتيجة هتظهر هنا','Your result will appear here')}</div></div>
  </div>
  ` + pageFoot();
}
function calc11_run(){
  const age = +document.getElementById('c11_age').value||0;
  const rage = +document.getElementById('c11_rage').value||0;
  const cs = +document.getElementById('c11_cs').value||0;
  const monthlyAdd = +document.getElementById('c11_monthly').value||0;
  const r = +document.getElementById('c11_r').value||0;
  const inc = +document.getElementById('c11_inc').value||0;
  const retYears = +document.getElementById('c11_yrs').value||1;
  const yearsToGo = Math.max(1, rage-age);

  const i = r/100/12;
  const n = yearsToGo*12;
  const nRet = retYears*12;

  // Forward projection: what you'll actually reach given your own planned monthly contribution
  const futureOfCurrent = cs*Math.pow(1+i,n);
  const futureOfContributions = i===0 ? monthlyAdd*n : monthlyAdd*((Math.pow(1+i,n)-1)/i);
  const nestEggReached = futureOfCurrent + futureOfContributions;

  // Target needed to fund the desired retirement income (annuity, same return rate)
  const targetNestEgg = i===0 ? inc*nRet : inc*((1-Math.pow(1+i,-nRet))/i);
  const gap = nestEggReached - targetNestEgg;

  // Post-retirement withdrawal strategies, based on the nest egg actually projected
  const staticWithdrawal = nestEggReached / nRet; // plain box, no further growth
  const investedDepleting = i===0 ? nestEggReached/nRet : nestEggReached * (i/(1-Math.pow(1+i,-nRet))); // annuity, depletes exactly at end
  const perpetualWithdrawal = nestEggReached * i; // withdraw only the yield, principal stays intact forever

  document.getElementById('c11_out').innerHTML = `
    <div class="result-headline">${fmtC(nestEggReached,0)}</div>
    <div class="result-sub">${L('المعاش المتوقع تجمعه عند التقاعد','Projected nest egg at retirement')}</div>
    <div class="result-row"><span class="rl">${L('المبلغ المطلوب لتغطية دخلك المنشود','Amount needed to cover your desired income')}</span><span class="rv">${fmtC(targetNestEgg,0)}</span></div>
    <div class="result-row"><span class="rl">${gap>=0 ? L('فائض متوقع','Projected surplus') : L('عجز متوقع','Projected shortfall')}</span><span class="rv ${gap>=0?'gold-gain-pos':'gold-gain-neg'}">${fmtC(Math.abs(gap),0)}</span></div>
    <div class="result-row"><span class="rl">${L('سنين متبقية للتقاعد','Years left until retirement')}</span><span class="rv">${yearsToGo}</span></div>

    <div class="share-section-label" style="margin-top:20px">${L('بعد التقاعد، تقدر تسحب شهريًا','After retirement, you can withdraw monthly')}</div>
    <div class="result-row"><span class="rl">${L('صندوق ثابت من غير استثمار (بينضب آخر المدة)','Static fund, no investment (depletes at the end)')}</span><span class="rv">${fmtC(staticWithdrawal,0)}</span></div>
    <div class="result-row"><span class="rl">${L('مستثمر وبينضب بالظبط آخر المدة','Invested, depletes exactly at the end')}</span><span class="rv">${fmtC(investedDepleting,0)}</span></div>
    <div class="result-row"><span class="rl">${L('مستثمر ودايم (تسحب العائد بس، رأس المال يفضل زي ما هو)','Invested & perpetual (withdraw only the yield, principal stays intact)')}</span><span class="rv">${fmtC(perpetualWithdrawal,0)}</span></div>
    <div class="formula-box">${L('لاحظ: كل ما استثمرت فلوس التقاعد بدل ما تسيبها في صندوق ثابت، كل ما قدرت تسحب شهريًا أكتر لنفس المدة — أو تخليها تفضل موجودة للأبد.','Notice: investing your retirement pool instead of leaving it idle lets you withdraw more each month for the same duration — or keep it going forever.')}</div>`;
}

  document.getElementById('c13_chart').innerHTML = chartData.length ? c13_donut(chartData, totalValue) : '';

function c13_donut(data, total){
  const r = 72, cx = 90, cy = 90, sw = 30, circ = 2*Math.PI*r;
  let offset = 0;
  const segs = data.map((d,i)=>{
    const frac = total>0 ? d.value/total : 0;
    const dash = frac*circ;
    const color = C13_PALETTE[i % C13_PALETTE.length];
    const seg = `<circle r="${r}" cx="${cx}" cy="${cy}" fill="none" stroke="${color}" stroke-width="${sw}"
      stroke-dasharray="${dash.toFixed(2)} ${(circ-dash).toFixed(2)}" stroke-dashoffset="${(-offset).toFixed(2)}"
      transform="rotate(-90 ${cx} ${cy})" stroke-linecap="butt"><title>${esc(d.name)}</title></circle>`;
    offset += dash;
    return {seg, color, frac};
  });
  const svg = `<svg class="donut-svg" width="180" height="180" viewBox="0 0 180 180">
    <circle r="${r}" cx="${cx}" cy="${cy}" fill="none" stroke="var(--border)" stroke-width="${sw}"/>
    ${segs.map(s=>s.seg).join('')}
    <text x="${cx}" y="${cy-4}" text-anchor="middle" class="donut-center-value" style="fill:var(--text); font-size:15px">${fmt(total,0)}</text>
    <text x="${cx}" y="${cy+14}" text-anchor="middle" class="donut-center-label">${esc(L('إجمالي القيمة','TOTAL VALUE'))}</text>
  </svg>`;
  const legend = `<div class="legend">${data.map((d,i)=>`
    <div class="legend-item">
      <span class="legend-dot" style="background:${C13_PALETTE[i % C13_PALETTE.length]}"></span>
      <span class="legend-name">${esc(d.name)}</span>
      <span class="legend-pct">${pct(total>0? d.value/total*100 : 0, 1)}</span>
    </div>`).join('')}</div>`;
  return `<div class="result-sub" style="margin-bottom:4px">${L('توزيع المحفظة حسب القيمة الحالية','Portfolio allocation by market value')}</div>
    <div class="donut-wrap">${svg}${legend}</div>`;
}

function goldCommAmount(lot){ return lot.commType === 'fixed' ? lot.commValue : lot.weight*lot.buy*(lot.commValue/100); }

function ratioLevel(val, good, mid, higherIsBetter=true){
  const pass = higherIsBetter ? val>=good : val<=good;
  const mid_pass = higherIsBetter ? val>=mid : val<=mid;
  if (pass) return 'good';
  if (mid_pass) return 'mid';
  return 'weak';
}

function ratioLevelLabel(level){
  return { good:L('قوي','Strong'), mid:L('متوسط','Moderate'), weak:L('ضعيف','Weak'), info:L('معلومة','Info') }[level] || '';
}

/* ===================== PROFESSIONAL MODE — shared master financial fields ===================== */
const MASTER_FIELD_GROUPS = [
  { key:'bs', ar:'الميزانية العمومية', en:'Balance Sheet', fields:[
    { id:'ca', ar:'الأصول المتداولة', en:'Current assets' },
    { id:'cl', ar:'الخصوم المتداولة', en:'Current liabilities' },
    { id:'inv', ar:'المخزون', en:'Inventory' },
    { id:'avginv', ar:'متوسط المخزون', en:'Average inventory' },
    { id:'cash', ar:'النقدية وما يعادلها', en:'Cash & equivalents' },
    { id:'tl', ar:'إجمالي الالتزامات', en:'Total liabilities' },
    { id:'ltd', ar:'الدين طويل الأجل', en:'Long-term debt' },
    { id:'eq', ar:'حقوق الملكية', en:'Equity' },
    { id:'ta', ar:'إجمالي الأصول', en:'Total assets' },
    { id:'ic', ar:'رأس المال المستثمر', en:'Invested capital' },
  ]},
  { key:'is', ar:'قائمة الدخل', en:'Income Statement', fields:[
    { id:'rev', ar:'الإيرادات', en:'Revenue' },
    { id:'cogs', ar:'تكلفة المبيعات', en:'COGS' },
    { id:'oi', ar:'ربح التشغيل', en:'Operating income' },
    { id:'ebit', ar:'الربح قبل الفوائد والضريبة (EBIT)', en:'EBIT' },
    { id:'ie', ar:'مصروف الفوائد', en:'Interest expense' },
    { id:'ni', ar:'صافي الدخل', en:'Net income' },
    { id:'nopat', ar:'صافي ربح التشغيل بعد الضريبة (NOPAT)', en:'NOPAT' },
  ]},
  { key:'mkt', ar:'بيانات السوق', en:'Market Data', fields:[
    { id:'sh', ar:'عدد الأسهم', en:'Shares outstanding' },
    { id:'price', ar:'سعر السهم', en:'Share price' },
    { id:'div', ar:'إجمالي التوزيعات', en:'Dividends paid' },
  ]},
];
const MASTER_FIELDS = MASTER_FIELD_GROUPS.flatMap(g=>g.fields);
// Ratio-specific input ids that map onto a shared master field, or are derived rather than entered directly
const MASTER_ALIAS = { te:'eq' };
const MASTER_DERIVED = {
  eps: m => m.sh ? (m.ni||0)/m.sh : 0,
  bvps: m => m.sh ? (m.eq||0)/m.sh : 0,
  mc: m => (m.price||0)*(m.sh||0),
  dps: m => m.sh ? (m.div||0)/m.sh : 0,
};
function masterFieldFor(inputId){
  if (MASTER_ALIAS[inputId]) return MASTER_ALIAS[inputId];
  if (MASTER_DERIVED[inputId]) return null;
  return inputId;
}
function buildRatioValsFromMaster(r, master){
  const vals = {};
  r.inputs.forEach(inp=>{
    if (MASTER_DERIVED[inp.id]) vals[inp.id] = MASTER_DERIVED[inp.id](master);
    else vals[inp.id] = master[masterFieldFor(inp.id)] || 0;
  });
  return vals;
}

let SELECTED_RATIOS = [];
let RATIO_INPUT_VALUES = {};

function toggleRatioInTable(id){
  if (SELECTED_RATIOS.includes(id)) removeRatioFromTable(id);
  else addRatioToTable(id);
}
function addRatioToTable(id){
  if (SELECTED_RATIOS.includes(id)) return;
  SELECTED_RATIOS.push(id);
  renderRatioWorkspace();
  syncCatalogState();
  saveRatioWorkspace();
}
function removeRatioFromTable(id){
  SELECTED_RATIOS = SELECTED_RATIOS.filter(x=>x!==id);
  delete RATIO_INPUT_VALUES[id];
  renderRatioWorkspace();
  syncCatalogState();
  saveRatioWorkspace();
}
function syncCatalogState(){
  RATIOS.forEach(r=>{
    const item = document.getElementById(`cat-item-${r.id}`);
    const add = document.getElementById(`cat-add-${r.id}`);
    if (!item || !add) return;
    const isIn = SELECTED_RATIOS.includes(r.id);
    item.classList.toggle('added', isIn);
    add.innerHTML = isIn ? ICON.check : ICON.plus;
  });
}

/* Fixed-position popover: shows info without shifting page layout or scroll position */
function showPopover(key, html, btn){
  const pop = document.getElementById('ratioPopover');
  if (!pop) return;
  if (pop.classList.contains('open') && pop.dataset.for === key){
    pop.classList.remove('open');
    return;
  }
  pop.innerHTML = html;
  pop.dataset.for = key;
  pop.classList.add('open');
  const rect = btn.getBoundingClientRect();
  const popW = Math.min(280, window.innerWidth - 20);
  let left = rect.left + rect.width/2 - popW/2;
  left = Math.max(10, Math.min(window.innerWidth - popW - 10, left));
  pop.style.width = popW + 'px';
  pop.style.left = left + 'px';
  const popH = pop.offsetHeight;
  let top = rect.bottom + 8;
  if (top + popH > window.innerHeight - 10) top = rect.top - popH - 8;
  pop.style.top = Math.max(10, top) + 'px';
}
function toggleRatioInfo(id, btn){

    <div class="ratio-source"><strong>${L('منين تجيبها:','Where to find it:')}</strong> ${L(r.source.ar, r.source.en)}</div>`;

}

function ratioResultCellHTML(r, vals){
  const hasAny = r.inputs.some(inp => vals[inp.id] !== undefined && vals[inp.id] !== '');
  if (!hasAny) return `<span class="ratio-table-placeholder">—</span>`;
  const result = r.calc(vals);
  const info = r.interpret(result);
  const displayVal = r.unit === '%' ? pct(result) : (r.unit === 'x' ? fmt(result)+'x' : fmt(result,0));
  return `<span class="ratio-result-value small">${displayVal}</span><span class="ratio-result-badge level-${info.level}">${ratioLevelLabel(info.level)}</span>`;
}

/* ---------- Persistence (localStorage) ---------- */
function saveRatioWorkspace(){
  try {
    const companyEl = document.getElementById('ratioCompanyName');
    const yearEl = document.getElementById('ratioCompanyYear');
    localStorage.setItem('cq_ratio_workspace', JSON.stringify({
      selected: SELECTED_RATIOS,
      values: RATIO_INPUT_VALUES,
      company: companyEl ? companyEl.value : '',
      year: yearEl ? yearEl.value : '',
      mode: ANALYSIS_MODE,
      proValues: PRO_MASTER_VALUES,
    }));
  } catch(e){}
}
function initRatioWorkspace(){
  try {
    const raw = localStorage.getItem('cq_ratio_workspace');
    if (raw){
      const data = JSON.parse(raw);
      SELECTED_RATIOS = Array.isArray(data.selected) ? data.selected.filter(id => RATIOS.some(r=>r.id===id)) : [];
      RATIO_INPUT_VALUES = data.values && typeof data.values === 'object' ? data.values : {};
      PRO_MASTER_VALUES = data.proValues && typeof data.proValues === 'object' ? data.proValues : {};
      ANALYSIS_MODE = data.mode === 'pro' ? 'pro' : 'normal';
      const companyEl = document.getElementById('ratioCompanyName');
      const yearEl = document.getElementById('ratioCompanyYear');
      if (companyEl) companyEl.value = data.company || '';
      if (yearEl) yearEl.value = data.year || '';
      MASTER_FIELDS.forEach(f => {
        const el = document.getElementById(`pro-${f.id}`);
        if (el && PRO_MASTER_VALUES[f.id]) el.value = PRO_MASTER_VALUES[f.id];
      });
    }
  } catch(e){}
  renderRatioWorkspace();
  syncCatalogState();
  renderProResultsTable();
  setAnalysisMode(ANALYSIS_MODE);
}

  const panel = document.getElementById(panelId);
  if (!panel) return;
  if (panel.querySelector('.placeholder')){
    alert(L('احسب النتيجة الأول عشان تقدر تعرضها','Calculate a result first so you can display it'));
    return;
  }
  document.getElementById('resultModalTool').textContent = toolName;

  let html = '';

  // Capture the inputs the user entered (first column of the same calc-grid, if any)
  const grid = panel.closest('.calc-grid');
  if (grid && grid.firstElementChild && grid.firstElementChild !== panel){
    const fields = grid.firstElementChild.querySelectorAll('.field');
    if (fields.length){
      let rows = '';
      fields.forEach(f=>{
        const label = f.querySelector('label');
        const input = f.querySelector('input, select');
        if (!label || !input) return;
        let val = input.tagName === 'SELECT' ? input.options[input.selectedIndex].text : input.value;
        if (val === '') val = '—';
        rows += `<div class="result-row"><span class="rl">${label.textContent}</span><span class="rv">${esc(val)}</span></div>`;
      });
      if (rows) html += `<div class="share-inputs"><div class="share-section-label">${L('البيانات اللي دخلتها','Your inputs')}</div>${rows}</div>`;
    }
  }

  html += `<div class="share-section-label">${L('النتيجة','Result')}</div>${panel.innerHTML}`;

  // Include any linked chart/table declared via data-share-extra
  if (panel.dataset.shareExtra){
    panel.dataset.shareExtra.split(',').forEach(id=>{
      const extra = document.getElementById(id.trim());
      if (extra && extra.innerHTML.trim()) html += extra.outerHTML;
    });
  }

  document.getElementById('resultModalBody').innerHTML = html;
  document.getElementById('resultModal').classList.add('active');
}
function closeResultCard(){
  document.getElementById('resultModal').classList.remove('active');
}

function initReveal(){
  const els = document.querySelectorAll('#mainContent .reveal:not(.in)');
  if (!('IntersectionObserver' in window)){ els.forEach(el=>el.classList.add('in')); return; }
  const io = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if (entry.isIntersecting){ entry.target.classList.add('in'); io.unobserve(entry.target); }
    });
  }, { threshold:0.12 });
  els.forEach(el=>io.observe(el));
}

/* ===================== SCROLL PROGRESS + BACK TO TOP ===================== */
function onScrollUpdate(){
  const doc = document.documentElement;
  const scrollTop = doc.scrollTop || document.body.scrollTop;
  const height = (doc.scrollHeight || document.body.scrollHeight) - doc.clientHeight;
  const pct = height > 0 ? Math.min(100, (scrollTop/height)*100) : 0;
  const bar = document.getElementById('scrollProgress');
  if (bar) bar.style.width = pct + '%';
  const btn = document.getElementById('backToTop');
  if (btn) btn.classList.toggle('show', scrollTop > 500);
}
window.addEventListener('scroll', onScrollUpdate, { passive: true });

/* ===================== SITE MODE (regular person / investor) ===================== */
function setSiteMode(mode, btn){
  SITE_MODE = mode;
  document.querySelectorAll('.mode-toggle-btn').forEach(b=>b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const featured = FEATURED_SETS[mode].map(id => SERVICES.find(s=>s.id===id)).filter(Boolean);
  document.getElementById('featuredGrid').innerHTML = renderServiceCards(featured);
  initReveal();
}

/* ===================== THEME / LANG / INIT ===================== */
function setCurrency(code){
  CURRENCY = code;
  updateQuickSettings();
  renderPage();
  closeCurrencyMenu();
  try { localStorage.setItem('cq_currency', code); } catch(e){}
}
function toggleMobileNav(){
  document.getElementById('mobileNavDropdown').classList.toggle('open');
}
document.addEventListener('click', (e)=>{
  const dd = document.getElementById('mobileNavDropdown');
  const toggle = document.getElementById('mobileNavToggle');
  if (dd && dd.classList.contains('open') && !dd.contains(e.target) && e.target !== toggle && !toggle.contains(e.target)){
    dd.classList.remove('open');
  }
  const curMenu = document.getElementById('currencyMenu');
  const curToggle = document.getElementById('quickCurrency');
  if (curMenu && curMenu.classList.contains('open') && !curMenu.contains(e.target) && e.target !== curToggle && !curToggle.contains(e.target)){
    curMenu.classList.remove('open');
  }
});
function toggleCurrencyMenu(){
  document.getElementById('currencyMenu').classList.toggle('open');
}
function closeCurrencyMenu(){
  const m = document.getElementById('currencyMenu');
  if (m) m.classList.remove('open');
}

function setTheme(theme){
  THEME = theme;
  document.documentElement.setAttribute('data-theme', THEME);
  updateQuickSettings();
  // Remember the user's theme choice across reloads. This relies on localStorage, which isn't
  // available in Claude.ai's in-chat artifact preview but works normally once the file is hosted
  // (e.g. on GitHub Pages) or opened directly in a browser.
  try { localStorage.setItem('cq_theme', theme); } catch(e){}
}
function setLang(lang){
  LANG = lang;
  applyStaticLang();
  updateQuickSettings();
  renderTicker();
  renderPage();
  try { localStorage.setItem('cq_lang', lang); } catch(e){}
}
function applyStaticLang(){
  document.documentElement.setAttribute('lang', LANG);
  document.documentElement.setAttribute('dir', LANG==='ar' ? 'rtl':'ltr');
  document.querySelectorAll('[data-ar]').forEach(el=>{
    el.textContent = LANG==='ar' ? el.dataset.ar : el.dataset.en;
  });
}
function updateQuickSettings(){
  const themeBtn = document.getElementById('quickTheme');
  if (themeBtn) themeBtn.innerHTML = THEME === 'day' ? ICON.moon : ICON.sun;
  const langBtn = document.getElementById('quickLang');
  if (langBtn) langBtn.textContent = LANG === 'ar' ? 'EN' : 'ع';
  const curBtn = document.getElementById('quickCurrency');
  if (curBtn) curBtn.textContent = CURRENCY;
  const menu = document.getElementById('currencyMenu');
  if (menu){
    menu.innerHTML = Object.keys(CURRENCIES).map(code => `
      <button class="currency-menu-item ${code===CURRENCY?'active':''}" onclick="setCurrency('${code}')">
        <span class="currency-menu-code">${code}</span>
        <span class="currency-menu-name">${LANG==='ar'?CURRENCIES[code].ar:CURRENCIES[code].en}</span>
        <span class="currency-menu-sym">${LANG==='ar'?CURRENCIES[code].symAr:CURRENCIES[code].symEn}</span>
      </button>`).join('');
  }
}
function updateNavActive(){
  const toolPages = SERVICES.map(s=>s.id).concat(['services']);
  const active = toolPages.includes(currentPage) ? 'services' : (currentPage === 'home' ? 'home' : currentPage);
  document.querySelectorAll('.nav-link, .mobile-nav-dropdown button').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.page === active);
  });
}

document.addEventListener('DOMContentLoaded', () => {
  try {
    const savedTheme = localStorage.getItem('cq_theme');
    if (savedTheme === 'day' || savedTheme === 'night') THEME = savedTheme;
    const savedLang = localStorage.getItem('cq_lang');
    if (savedLang === 'ar' || savedLang === 'en') LANG = savedLang;
    const savedCurrency = localStorage.getItem('cq_currency');
    if (savedCurrency && CURRENCIES[savedCurrency]) CURRENCY = savedCurrency;
  } catch(e){}
  document.documentElement.setAttribute('data-theme', THEME);
  applyStaticLang();
  updateQuickSettings();
  renderTicker();
  currentPage = location.hash.replace('#','') || 'home';
  renderPage();
});

</script>
