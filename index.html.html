<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="night">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Guide — دليلك الاستثماري</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root[data-theme="night"]{
  --bg:#0a0a0b; --bg-alt:#151516; --card:#131314; --text:#f4f3f0; --text-soft:#93908a;
  --border:#2a2a2b; --border-strong:#48474a; --inv:#000000; --shadow:rgba(0,0,0,.55);
  --gold:#cea968; --gold-soft:rgba(206,169,104,.14);
}
:root[data-theme="day"]{
  --bg:#faf9f6; --bg-alt:#f1efe9; --card:#ffffff; --text:#0d0c0a; --text-soft:#6b675e;
  --border:#e1ded4; --border-strong:#0d0c0a; --inv:#ffffff; --shadow:rgba(20,15,5,.09);
  --gold:#9c7a34; --gold-soft:rgba(156,122,52,.10);
}
*{box-sizing:border-box; margin:0; padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg); color:var(--text);
  font-family:'Cairo',sans-serif;
  min-height:100vh; transition:background .35s ease, color .35s ease;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
.letterhead{height:3px; background:linear-gradient(90deg, transparent, var(--gold) 18%, var(--gold) 82%, transparent);}
::selection{background:var(--gold); color:#0a0a0a;}
:focus-visible{outline:2px solid var(--gold); outline-offset:2px;}
.mono{font-family:'IBM Plex Mono',monospace;}
a{color:inherit;}
button{font-family:inherit; cursor:pointer;}
input, select{font-family:inherit;}

/* ---------- Ticker strip ---------- */
.ticker-wrap{
  border-bottom:1px solid var(--border); overflow:hidden; white-space:nowrap;
  background:var(--bg-alt); padding:7px 0;
}
.ticker{display:inline-block; padding-inline-start:100%; animation:ticker 38s linear infinite;}
.ticker span{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--text-soft); margin-inline-end:48px; letter-spacing:.03em;}
@keyframes ticker{ from{transform:translateX(0);} to{transform:translateX(-100%);} }
[dir="rtl"] .ticker{padding-inline-start:0; padding-inline-end:100%;}
[dir="rtl"] @keyframes ticker{}

/* ---------- Header ---------- */
header.site{
  display:flex; align-items:center; justify-content:space-between;
  padding:20px clamp(16px,5vw,48px); border-bottom:1px solid var(--border);
  position:sticky; top:0; background:color-mix(in srgb, var(--bg) 92%, transparent);
  backdrop-filter:blur(10px); z-index:50; box-shadow:0 2px 20px var(--shadow);
}
.brand{display:flex; align-items:center; gap:12px; cursor:pointer;}
.brand-mark{
  width:40px; height:40px; border:1.5px solid var(--gold); border-radius:3px;
  display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono',monospace;
  font-weight:600; font-size:14px; color:var(--gold); letter-spacing:-.02em; position:relative;
}
.brand-mark::after{content:''; position:absolute; inset:4px; border:1px solid var(--border);}
.brand-name{font-weight:900; font-size:19px; letter-spacing:-.01em;}
.brand-sub{font-size:10px; color:var(--text-soft); letter-spacing:.16em; text-transform:uppercase; font-family:'IBM Plex Mono',monospace;}
.header-actions{display:flex; align-items:center; gap:10px;}
.pill-btn{
  border:1px solid var(--border-strong); background:transparent; color:var(--text);
  padding:8px 14px; border-radius:999px; font-size:13px; font-weight:600;
  display:flex; align-items:center; gap:6px; transition:.2s;
}
.pill-btn:hover{background:var(--text); color:var(--bg);}
.icon-btn{
  width:38px; height:38px; border-radius:50%; border:1px solid var(--border-strong);
  background:transparent; color:var(--text); display:flex; align-items:center; justify-content:center;
  transition:.2s;
}
.icon-btn:hover{background:var(--text); color:var(--bg);}
.icon-btn svg{width:17px; height:17px;}

/* ---------- Layout ---------- */
main{max-width:1180px; margin:0 auto; padding:0 clamp(16px,5vw,48px);}
.page{display:none;}
.page.active{display:block; animation:fadein .4s ease;}
@keyframes fadein{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

/* ---------- Hero ---------- */
.hero{padding:clamp(48px,8vw,96px) 0 56px; border-bottom:1px solid var(--border); position:relative;}
.hero-eyebrow{
  font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.18em; text-transform:uppercase;
  color:var(--text-soft); margin-bottom:22px; display:flex; align-items:center; gap:10px;
}
.hero-eyebrow::before{content:''; width:22px; height:1px; background:var(--gold); display:inline-block;}
.hero h1{
  font-size:clamp(34px,6vw,64px); font-weight:900; line-height:1.12; letter-spacing:-.02em; max-width:16ch;
}
.hero-quote{
  margin-top:34px; padding-inline-start:22px; border-inline-start:2px solid var(--gold);
  font-size:clamp(16px,2vw,20px); max-width:56ch; color:var(--text-soft); font-style:normal; line-height:1.6;
}
.hero-quote cite{display:block; margin-top:10px; font-size:13px; font-family:'IBM Plex Mono',monospace; color:var(--text-soft); font-style:normal;}
.hero-chart{margin-top:44px; width:100%; max-width:640px;}
.hero-chart svg{width:100%; height:auto; display:block;}

/* ---------- Services grid ---------- */
.section-head{padding:56px 0 28px;}
.section-head .kicker{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--text-soft); letter-spacing:.14em; text-transform:uppercase;}
.section-head h2{font-size:clamp(24px,3.4vw,34px); font-weight:800; margin-top:10px;}
.services-grid{
  display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:1px;
  background:var(--border); border:1px solid var(--border); margin-bottom:64px;
}
.service-card{
  background:var(--card); padding:26px 24px 22px; cursor:pointer; transition:.25s; position:relative;
  display:flex; flex-direction:column; gap:14px; min-height:168px;
}
.service-card:hover{background:var(--bg-alt); box-shadow:inset 0 2px 0 var(--gold); transform:translateY(-1px);}
.service-num{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--gold); letter-spacing:.05em;}
.service-title{font-size:17px; font-weight:700; line-height:1.35;}
.service-desc{font-size:13px; color:var(--text-soft); line-height:1.55; flex:1;}
.service-arrow{
  align-self:flex-end; width:30px; height:30px; border-radius:50%; border:1px solid var(--border-strong);
  display:flex; align-items:center; justify-content:center; transition:.2s;
}
.service-card:hover .service-arrow{background:var(--text); color:var(--bg);}
.service-arrow svg{width:14px; height:14px; transform:scaleX(-1);}
[dir="ltr"] .service-arrow svg{transform:none;}

/* ---------- Calc page ---------- */
.calc-page{padding:36px 0 80px;}
.back-link{
  display:inline-flex; align-items:center; gap:8px; font-size:13px; color:var(--text-soft);
  font-family:'IBM Plex Mono',monospace; margin-bottom:26px; cursor:pointer;
}
.back-link svg{width:13px; height:13px; transform:scaleX(-1);}
[dir="ltr"] .back-link svg{transform:none;}
.calc-num{font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--text-soft); letter-spacing:.1em;}
.calc-title{font-size:clamp(26px,4vw,40px); font-weight:900; margin-top:8px; letter-spacing:-.01em;}
.calc-desc{margin-top:14px; max-width:70ch; color:var(--text-soft); font-size:15px; line-height:1.7;}
.notice{
  margin-top:22px; border:1px solid var(--border-strong); padding:14px 18px; font-size:13.5px;
  display:flex; gap:10px; align-items:flex-start; line-height:1.6; background:var(--bg-alt);
}
.notice.warn{border-color:var(--text); font-weight:600;}
.notice svg{width:16px; height:16px; flex-shrink:0; margin-top:2px;}

.calc-grid{display:grid; grid-template-columns:1fr 1fr; gap:40px; margin-top:36px;}
@media(max-width:820px){.calc-grid{grid-template-columns:1fr;}}
.field{margin-bottom:18px;}
.field label{display:block; font-size:13px; font-weight:600; margin-bottom:7px; color:var(--text-soft);}
.field .hint{font-size:11.5px; color:var(--text-soft); margin-top:5px; line-height:1.5;}
.field input, .field select{
  width:100%; padding:11px 13px; border:1px solid var(--border-strong); background:var(--bg);
  color:var(--text); border-radius:2px; font-size:14.5px;
}
.field input:focus, .field select:focus{outline:2px solid var(--text); outline-offset:1px;}
.row2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
@media(max-width:520px){.row2{grid-template-columns:1fr;}}

.btn{
  border:1.5px solid var(--text); background:var(--text); color:var(--bg); padding:13px 26px;
  font-weight:700; font-size:14.5px; border-radius:2px; transition:.2s; margin-top:6px;
}
.btn:hover{opacity:.88; box-shadow:0 0 0 2px var(--gold-soft), 0 6px 18px var(--shadow);}
.btn.secondary{background:transparent; color:var(--text);}
.btn.small{padding:9px 16px; font-size:13px;}

.result-panel{
  border:1px solid var(--border-strong); border-top:2px solid var(--gold); padding:26px; background:var(--bg-alt); min-height:120px;
  box-shadow:0 10px 30px var(--shadow);
}
.result-panel .placeholder{color:var(--text-soft); font-size:13.5px; text-align:center; padding:40px 0;}
.result-row{
  display:flex; justify-content:space-between; align-items:baseline; padding:11px 0; border-bottom:1px dashed var(--border);
  gap:12px;
}
.result-row:last-child{border-bottom:none;}
.result-row .rl{font-size:13.5px; color:var(--text-soft);}
.result-row .rv{font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:15px; text-align:end;}
.result-headline{font-size:28px; font-weight:900; margin-bottom:6px; font-family:'IBM Plex Mono',monospace; color:var(--gold);}
.result-sub{font-size:12.5px; color:var(--text-soft); margin-bottom:18px;}

.table-wrap{overflow-x:auto; margin-top:20px; border:1px solid var(--border);}
table{width:100%; border-collapse:collapse; font-size:13px;}
table th, table td{padding:9px 12px; text-align:start; border-bottom:1px solid var(--border); white-space:nowrap;}
table th{background:var(--bg-alt); font-size:11.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-soft);}
table td{font-family:'IBM Plex Mono',monospace;}

.formula-box{
  margin-top:22px; border:1px dashed var(--border-strong); padding:16px 18px; font-size:12.5px;
  color:var(--text-soft); font-family:'IBM Plex Mono',monospace; line-height:1.9; white-space:pre-wrap;
}
.tabs{display:flex; gap:8px; margin-bottom:22px; flex-wrap:wrap;}
.tab-btn{
  border:1px solid var(--border-strong); background:transparent; color:var(--text); padding:9px 16px;
  font-size:13px; border-radius:999px; font-weight:600;
}
.tab-btn.active{background:var(--text); color:var(--bg); border-color:var(--gold);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

.chip-select{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px;}
.chip{border:1px solid var(--border-strong); padding:8px 15px; border-radius:999px; font-size:13px; background:transparent;}
.chip.active{background:var(--text); color:var(--bg); border-color:var(--gold);}

.bars{display:flex; align-items:flex-end; gap:10px; height:160px; margin-top:10px;}
.bar-col{flex:1; display:flex; flex-direction:column; align-items:center; gap:8px; height:100%; justify-content:flex-end;}
.bar{width:100%; background:var(--gold); border-radius:2px 2px 0 0; min-height:2px;}
.bar-label{font-size:11px; color:var(--text-soft); font-family:'IBM Plex Mono',monospace;}

.donut-wrap{display:flex; align-items:center; gap:40px; flex-wrap:wrap; padding:8px 4px;}
.donut-svg{flex-shrink:0;}
.donut-center-value{font-family:'IBM Plex Mono',monospace; font-weight:800;}
.donut-center-label{font-size:10px; fill:var(--text-soft); letter-spacing:.06em;}
.legend{display:flex; flex-direction:column; gap:12px; flex:1; min-width:200px;}
.legend-item{display:flex; align-items:center; gap:10px; font-size:13px;}
.legend-dot{width:11px; height:11px; border-radius:3px; flex-shrink:0;}
.legend-name{flex:1; font-weight:600;}
.legend-pct{font-family:'IBM Plex Mono',monospace; color:var(--text-soft); font-size:12.5px;}
.type-badge{
  display:inline-flex; align-items:center; gap:5px; font-size:11px; padding:3px 9px; border-radius:999px;
  border:1px solid var(--border-strong); font-family:'Cairo',sans-serif; white-space:nowrap;
}
.type-badge svg{width:11px; height:11px;}
.type-badge.fund{color:var(--gold); border-color:var(--gold);}

.tracker-row{display:grid; grid-template-columns:1.3fr .9fr .8fr .8fr .8fr auto; gap:8px; align-items:center; margin-bottom:10px;}
@media(max-width:820px){.tracker-row{grid-template-columns:1fr 1fr;}}
.tracker-row input, .tracker-row select{
  padding:10px 12px; border:1px solid var(--border-strong); background:var(--bg); color:var(--text);
  border-radius:2px; font-size:13.5px; font-family:'Cairo',sans-serif; width:100%;
}
.remove-x{width:30px; height:30px; border:1px solid var(--border-strong); border-radius:50%; background:transparent; color:var(--text); font-size:15px;}

.ai-box{border:1px solid var(--border-strong); padding:18px; margin-top:18px; background:var(--bg); font-size:13.5px; line-height:1.85; min-height:70px;}
.ai-loading{display:flex; gap:8px; align-items:center; color:var(--text-soft); font-size:13px;}
.dotpulse{width:6px; height:6px; border-radius:50%; background:var(--text-soft); animation:pulse 1s infinite ease-in-out;}
.dotpulse:nth-child(2){animation-delay:.15s;} .dotpulse:nth-child(3){animation-delay:.3s;}
@keyframes pulse{0%,100%{opacity:.25;} 50%{opacity:1;}}

.footer-disclaimer{
  margin-top:30px; font-size:11.5px; color:var(--text-soft); border-top:1px solid var(--border); padding-top:16px; line-height:1.7;
}

/* ---------- Footer ---------- */
footer.site{
  border-top:1px solid var(--border); padding:34px clamp(16px,5vw,48px) 44px; margin-top:60px;
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px;
}
.footer-credit{font-size:13px; color:var(--text-soft); font-family:'IBM Plex Mono',monospace;}
.footer-credit b{color:var(--text);}
.social-icon{
  width:38px; height:38px; border-radius:50%; border:1px solid var(--border-strong);
  display:flex; align-items:center; justify-content:center; transition:.2s;
}
.social-icon:hover{background:var(--text); color:var(--bg);}
.social-icon svg{width:17px; height:17px;}
</style>
</head>
<body>

<div class="ticker-wrap"><div class="ticker" id="tickerTape"></div></div>

<header class="site">
  <div class="brand" onclick="navigate('home')">
    <div class="brand-mark mono">IG</div>
    <div>
      <div class="brand-name" data-ar="Investment Guide" data-en="Investment Guide">Investment Guide</div>
      <div class="brand-sub" data-ar="أدوات القرار الاستثماري" data-en="Investment decision tools">أدوات القرار الاستثماري</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="pill-btn" id="langBtn" onclick="toggleLang()" data-ar="English" data-en="العربية">English</button>
    <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Theme" aria-label="toggle theme"></button>
  </div>
</header>
<div class="letterhead"></div>

<main id="mainContent"></main>

<footer class="site">
  <div class="footer-credit">by <b>Ahmed Banzema</b></div>
  <a class="social-icon" href="https://www.instagram.com/banzema_official" target="_blank" rel="noopener" aria-label="Instagram">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.3" cy="6.7" r="1"/></svg>
  </a>
</footer>

<script>
/* ===================== STATE ===================== */
let LANG = 'ar';
let THEME = 'night';
let currentPage = 'home';

function L(ar, en){ return LANG === 'ar' ? ar : en; }
function fmt(n, d = 2){
  if (n === null || n === undefined || !isFinite(n)) return '—';
  return n.toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
}
function pct(n, d = 2){ return fmt(n, d) + '%'; }
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ===================== ICONS ===================== */
const ICON = {
  arrow: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>`,
  info: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9.5"/><path d="M12 8v.01M12 11v5" stroke-linecap="round"/></svg>`,
  warn: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2 1 21h22L12 2Z"/><path d="M12 9v5M12 17v.01" stroke-linecap="round"/></svg>`,
  sun: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1" stroke-linecap="round"/></svg>`,
  moon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4 7 7 0 0 0 20 14.5Z"/></svg>`,
  stockIcon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l5-5 4 4 8-9"/><path d="M15 7h5v5"/></svg>`,
  fundIcon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M12 3 3 8l9 5 9-5-9-5Z"/><path d="M3 12l9 5 9-5M3 16l9 5 9-5"/></svg>`
};

/* ===================== SERVICES REGISTRY ===================== */
const SERVICES = [
  { id:'calc1', title:L2('حاسبة العائد الاستثماري','Investment Return Calculator'), desc:L2('احسب قيمة استثمارك في المستقبل، وقيّم الأسهم والصناديق والسندات بكل التفاصيل.','Project your investment’s future value, and evaluate stocks, funds and bonds in full detail.') },
  { id:'calc2', title:L2('حاسبة التضخم','Inflation Calculator'), desc:L2('اعرف قوة فلوسك الشرائية هتقل قد إيه مع الوقت، أو كانت نقصت قد إيه من زمان لحد دلوقتي.','See how much purchasing power your money loses over time — forward or looking back.') },
  { id:'calc3', title:L2('أول مليون','First Million'), desc:L2('حط المبلغ اللي بتدخره كل شهر أو سنة، واعرف هتوصل لأول مليون بعد كام سنة.','Enter what you save monthly or yearly and find out when you’ll hit your first million.') },
  { id:'calc4', title:L2('حاسبة القرض','Loan Calculator'), desc:L2('اعرف قسطك الشهري، إجمالي الفوائد، وجدول السداد بالكامل.','Work out your monthly installment, total interest, and the full repayment schedule.') },
  { id:'calc5', title:L2('تقسيم المحفظة الاستثمارية','Portfolio Allocation'), desc:L2('بناءً على سنك، هنقترح توزيع المحفظة بأكتر من طريقة ومدرسة استثمارية.','Based on your age, get portfolio splits from several investing schools of thought.') },
  { id:'calc6', title:L2('قاعدة الـ72','Rule of 72'), desc:L2('اعرف استثمارك هيتضاعف امتى بس من خلال قسمة بسيطة.','Find out when your investment doubles with one simple division.') },
  { id:'calc7', title:L2('حاسبة النسب المالية','Financial Ratios Calculator'), desc:L2('دخّل أرقام قوائم الشركة واحسب أهم النسب المالية اللي تقيّم بيها السهم.','Enter a company’s financial statement figures and compute the key ratios that evaluate it.') },
  { id:'calc8', title:L2('فاحص الأسهم','Stock Screener'), desc:L2('دخّل بيانات السهم وهنقولك هو كويس ولا لأ ونوضحلك ليه.','Enter a stock’s figures and we’ll tell you if it looks strong or weak, and why.') },
  { id:'calc9', title:L2('مخطط الميزانية بالـ AI','Budget Planner AI'), desc:L2('اكتب دخلك وهنقسمهولك على احتياجات وادخار واستثمار وترفيه مع اقتراحات ذكية.','Enter your income and get an AI split across needs, savings, investing and fun.') },

function fvSeries(P, PMT, annualRate, years){
  const i = annualRate/100/12, n = years*12;
  const fv = P*Math.pow(1+i, n) + (i===0 ? PMT*n : PMT*((Math.pow(1+i,n)-1)/i));
  const invested = P + PMT*n;
  return { fv, invested, profit: fv-invested };
}

function calc1_main(){
  const P = +document.getElementById('c1_p').value || 0;
  const PMT = +document.getElementById('c1_pmt').value || 0;
  const n = +document.getElementById('c1_n').value || 0;
  const r = +document.getElementById('c1_r').value || 0;
  const { fv, invested, profit } = fvSeries(P, PMT, r, n);
  document.getElementById('c1_out').innerHTML = `
    <div class="result-headline">${fmt(fv,0)}</div>
    <div class="result-sub">${L('القيمة المستقبلية المتوقعة','Projected future value')}</div>
    <div class="result-row"><span class="rl">${L('إجمالي المبلغ المستثمر','Total capital invested')}</span><span class="rv">${fmt(invested,0)}</span></div>
    <div class="result-row"><span class="rl">${L('صافي الربح','Net profit')}</span><span class="rv">${fmt(profit,0)}</span></div>
    <div class="result-row"><span class="rl">${L('نسبة النمو الإجمالية','Total growth')}</span><span class="rv">${pct(invested?(profit/invested*100):0)}</span></div>
    <div class="formula-box">FV = P(1+i)^n + PMT × [((1+i)^n − 1)/i]${L('  — i: العائد الشهري، n: عدد الشهور',' — i: monthly rate, n: number of months')}</div>`;
}

function calc1_stocks(){
  const amt = +document.getElementById('c1b_amt').value||0;
  const bc = +document.getElementById('c1b_bc').value||0;
  const sc = +document.getElementById('c1b_sc').value||0;
  const fee = +document.getElementById('c1b_fee').value||0;
  const divY = +document.getElementById('c1b_div').value||0;
  const tax = +document.getElementById('c1b_tax').value||0;
  const ret = +document.getElementById('c1b_ret').value||0;
  const years = +document.getElementById('c1b_n').value||1;

  const actualCapital = amt * (1 + bc/100);
  const netAnnualGrowth = (ret - fee)/100;
  const grossExitValue = amt * Math.pow(1+netAnnualGrowth, years);
  const netSaleValue = grossExitValue * (1 - sc/100);
  const capitalGain = netSaleValue - actualCapital;
  const totalDividendsGross = amt * (divY/100) * years;
  const netDividends = totalDividendsGross * (1 - tax/100);
  const cagr = (Math.pow(netSaleValue/actualCapital, 1/years) - 1) * 100;

  document.getElementById('c1b_out').innerHTML = `
    <div class="result-headline">${fmt(netSaleValue + netDividends,0)}</div>
    <div class="result-sub">${L('إجمالي العائد المتوقع (بيع + توزيعات)','Total expected return (sale + dividends)')}</div>
    <div class="result-row"><span class="rl">${L('رأس المال الفعلي (شامل العمولة)','Actual capital (incl. commission)')}</span><span class="rv">${fmt(actualCapital,0)}</span></div>
    <div class="result-row"><span class="rl">${L('صافي قيمة البيع','Net sale value')}</span><span class="rv">${fmt(netSaleValue,0)}</span></div>
    <div class="result-row"><span class="rl">${L('الربح/الخسارة الرأسمالية','Capital gain/loss')}</span><span class="rv">${fmt(capitalGain,0)}</span></div>
    <div class="result-row"><span class="rl">${L('صافي التوزيعات بعد الضريبة','Net dividends after tax')}</span><span class="rv">${fmt(netDividends,0)}</span></div>
    <div class="result-row"><span class="rl">CAGR</span><span class="rv">${pct(cagr)}</span></div>
    <div class="formula-box">CAGR = (${L('القيمة النهائية/رأس المال','End value / capital')})^(1/n) − 1</div>`;
}

function calc1_bonds(){
  const face = +document.getElementById('c1c_face').value||0;
  const price = +document.getElementById('c1c_price').value||1;
  const couponRate = +document.getElementById('c1c_coupon').value||0;
  const years = +document.getElementById('c1c_years').value||1;
  const tax = +document.getElementById('c1c_tax').value||0;
  const inf = +document.getElementById('c1c_inf').value||0;

  const couponAmt = face * couponRate/100;
  const currentYield = (couponAmt/price)*100;
  const ytm = ((couponAmt + (face-price)/years) / ((face+price)/2)) * 100;
  const realYield = ((1+ytm/100)/(1+inf/100) - 1) * 100;
  const capGain = face - price;

  let pvSum = 0, weightedSum = 0;
  const y = ytm/100;
  let rows = '';
  for (let t=1; t<=years; t++){
    const cf = t===years ? couponAmt + face : couponAmt;
    const pv = cf / Math.pow(1+y, t);
    pvSum += pv;
    weightedSum += t*pv;
    const netCoupon = couponAmt*(1-tax/100);
    rows += `<tr><td>${t}</td><td>${fmt(couponAmt,0)}</td><td>${fmt(couponAmt*tax/100,0)}</td><td>${fmt(netCoupon,0)}</td><td>${fmt(pv,0)}</td></tr>`;
  }
  const macaulay = weightedSum/pvSum;
  const modDuration = macaulay/(1+y);

  document.getElementById('c1c_out').innerHTML = `
    <div class="result-headline">${pct(ytm)}</div>
    <div class="result-sub">YTM — ${L('العائد حتى الاستحقاق (تقريبي)','Yield to maturity (approx.)')}</div>
    <div class="result-row"><span class="rl">${L('العائد الجاري (Current Yield)','Current yield')}</span><span class="rv">${pct(currentYield)}</span></div>
    <div class="result-row"><span class="rl">${L('العائد الحقيقي بعد التضخم','Real yield after inflation')}</span><span class="rv">${pct(realYield)}</span></div>
    <div class="result-row"><span class="rl">${L('الربح/الخسارة الرأسمالية عند الاستحقاق','Capital gain/loss at maturity')}</span><span class="rv">${fmt(capGain,0)}</span></div>
    <div class="result-row"><span class="rl">Macaulay Duration</span><span class="rv">${fmt(macaulay)} ${L('سنة','yrs')}</span></div>
    <div class="result-row"><span class="rl">Modified Duration</span><span class="rv">${fmt(modDuration)}</span></div>
    <div class="table-wrap"><table><thead><tr><th>${L('سنة','Year')}</th><th>${L('كوبون','Coupon')}</th><th>${L('ضريبة','Tax')}</th><th>${L('صافي','Net')}</th><th>PV</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function calc2_future(){

  const years = +document.getElementById('c2a_years').value||0;
  const rate = +document.getElementById('c2a_rate').value||0;
  const futureValue = amt/Math.pow(1+rate/100, years);

  document.getElementById('c2a_out').innerHTML = `
    <div class="result-headline">${fmt(futureValue,0)}</div>

function c2_setMode(mode){
  c2_mode = mode;
  document.getElementById('c2_chip_avg').classList.toggle('active', mode==='avg');
  document.getElementById('c2_chip_each').classList.toggle('active', mode==='each');
  document.getElementById('c2_avgWrap').style.display = mode==='avg' ? 'block':'none';
  document.getElementById('c2_eachWrap').style.display = mode==='each' ? 'block':'none';
  if (mode==='each') c2_rebuildYearRows();
}
function c2_rebuildYearRows(){
  const years = Math.max(1, Math.min(60, +document.getElementById('c2b_years').value||1));
  const wrap = document.getElementById('c2_eachWrap');
  const now = new Date().getFullYear();
  let html = '';
  for (let k=0;k<years;k++){
    const yr = now - years + k + 1;
    html += `<div class="field"><label>${L('نسبة تضخم','Inflation rate')} ${yr}</label><input type="number" class="c2_yr" value="18"></div>`;
  }
  wrap.innerHTML = html;
}
function calc2_hist(){
  const amt = +document.getElementById('c2b_amt').value||0;
  const years = +document.getElementById('c2b_years').value||0;
  let factor = 1;
  if (c2_mode === 'avg'){
    const rate = +document.getElementById('c2b_avgrate').value||0;
    factor = Math.pow(1+rate/100, years);
  } else {
    document.querySelectorAll('.c2_yr').forEach(inp => { factor *= (1 + (+inp.value||0)/100); });
  }
  const todayValue = amt/factor;
  const loss = amt - todayValue;
  document.getElementById('c2b_out').innerHTML = `
    <div class="result-headline">${fmt(todayValue,0)}</div>
    <div class="result-sub">${L('القوة الشرائية الحقيقية للمبلغ اليوم','What that amount is really worth today')}</div>
    <div class="result-row"><span class="rl">${L('الفاقد من القيمة','Value lost')}</span><span class="rv">${fmt(loss,0)}</span></div>

}

  </div>
  ` + pageFoot();

function calc3_run(){
  const P = +document.getElementById('c3_p').value||0;
  const freq = document.getElementById('c3_freq').value;
  const pmtIn = +document.getElementById('c3_pmt').value||0;
  const r = +document.getElementById('c3_r').value||0;
  const target = +document.getElementById('c3_target').value||1000000;

  const i = r/100/12;
  const monthlyPMT = freq==='monthly' ? pmtIn : pmtIn/12;
  let bal = P, months = 0;
  const capMonths = 1200;
  while (bal < target && months < capMonths){
    bal = bal*(1+i) + monthlyPMT;
    months++;
  }
  const out = document.getElementById('c3_out');
  if (months >= capMonths && bal < target){
    out.innerHTML = `<div class="result-headline">100+ ${L('سنة','yrs')}</div><div class="result-sub">${L('بالمعدل ده مش هتوصل للهدف في وقت معقول — جرّب تزوّد المبلغ الشهري أو العائد المتوقع.','At this rate you won’t reach the target within a reasonable time — try a higher contribution or return.')}</div>`;
    return;
  }
  const years = Math.floor(months/12), rem = months%12;
  out.innerHTML = `
    <div class="result-headline">${years} ${L('سنة و','y')} ${rem} ${L('شهر','mo')}</div>
    <div class="result-sub">${L('الوقت المتوقع للوصول لـ','Estimated time to reach')} ${fmt(target,0)}</div>
    <div class="result-row"><span class="rl">${L('إجمالي عدد الشهور','Total months')}</span><span class="rv">${months}</span></div>
    <div class="result-row"><span class="rl">${L('الرصيد التقريبي عند الوصول','Approx. balance reached')}</span><span class="rv">${fmt(bal,0)}</span></div>`;
}

function calc4_run(){
  const amt = +document.getElementById('c4_amt').value||0;
  const years = +document.getElementById('c4_years').value||1;
  const rate = +document.getElementById('c4_rate').value||0;
  const i = rate/100/12, n = years*12;
  const installment = i===0 ? amt/n : amt*i/(1-Math.pow(1+i,-n));
  const totalPay = installment*n;
  const totalInterest = totalPay - amt;

  document.getElementById('c4_out').innerHTML = `
    <div class="result-headline">${fmt(installment,0)}</div>
    <div class="result-sub">${L('القسط الشهري','Monthly installment')}</div>
    <div class="result-row"><span class="rl">${L('إجمالي المدفوعات','Total payments')}</span><span class="rv">${fmt(totalPay,0)}</span></div>
    <div class="result-row"><span class="rl">${L('إجمالي الفوائد','Total interest')}</span><span class="rv">${fmt(totalInterest,0)}</span></div>`;

  let bal = amt, rows = '';
  for (let m=1; m<=n; m++){
    const interestPortion = bal*i;
    const principalPortion = installment - interestPortion;
    bal -= principalPortion;
    rows += `<tr><td>${m}</td><td>${fmt(installment,0)}</td><td>${fmt(principalPortion,0)}</td><td>${fmt(interestPortion,0)}</td><td>${fmt(Math.max(bal,0),0)}</td></tr>`;
  }
  document.getElementById('c4_table').innerHTML = `
    <div class="table-wrap" style="max-height:420px; overflow-y:auto;"><table><thead><tr>
      <th>${L('الشهر','Month')}</th><th>${L('القسط','Installment')}</th><th>${L('أصل','Principal')}</th><th>${L('فائدة','Interest')}</th><th>${L('المتبقي','Remaining')}</th>
    </tr></thead><tbody>${rows}</tbody></table></div>`;
}

}

function calc10_dcf(){
  const fcf0 = +document.getElementById('c10a_fcf').value||0;
  const g = +document.getElementById('c10a_g').value/100||0;
  const disc = +document.getElementById('c10a_disc').value/100||0.01;
  const tg = +document.getElementById('c10a_tg').value/100||0;
  const shares = +document.getElementById('c10a_shares').value||1;

  let pv = 0, fcf = fcf0;
  for (let t=1;t<=5;t++){ fcf = fcf*(1+g); pv += fcf/Math.pow(1+disc,t); }
  const terminalValue = (fcf*(1+tg))/(disc-tg);
  const pvTerminal = terminalValue/Math.pow(1+disc,5);
  const totalValue = pv+pvTerminal;
  const perShare = totalValue/shares;

  document.getElementById('c10a_out').innerHTML = `
    <div class="result-headline">${fmt(perShare)}</div>
    <div class="result-sub">${L('القيمة العادلة للسهم بطريقة DCF','Fair value per share (DCF)')}</div>
    <div class="result-row"><span class="rl">${L('القيمة الحالية للتدفقات (5 سنين)','PV of 5-year cash flows')}</span><span class="rv">${fmt(pv,0)}</span></div>
    <div class="result-row"><span class="rl">${L('القيمة النهائية المخصومة','Discounted terminal value')}</span><span class="rv">${fmt(pvTerminal,0)}</span></div>
    <div class="result-row"><span class="rl">${L('إجمالي القيمة','Total value')}</span><span class="rv">${fmt(totalValue,0)}</span></div>
    <div class="formula-box">TV = FCF₅×(1+g_t) / (r − g_t)${L('  — يُخصم بمعدل r لكل سنة',' — discounted at rate r each year')}</div>`;
}
function calc10_graham(){
  const eps = +document.getElementById('c10b_eps').value||0;
  const g = +document.getElementById('c10b_g').value||0;
  const y = +document.getElementById('c10b_y').value||4.4;
  const value = (eps*(8.5+2*g)*4.4)/y;
  document.getElementById('c10b_out').innerHTML = `
    <div class="result-headline">${fmt(value)}</div>
    <div class="result-sub">${L('القيمة العادلة بمعادلة جراهام','Fair value (Graham formula)')}</div>
    <div class="formula-box">V = EPS × (8.5 + 2g) × 4.4 / Y</div>`;
}
function calc10_pe(){
  const eps = +document.getElementById('c10c_eps').value||0;
  const pe = +document.getElementById('c10c_pe').value||0;
  const value = eps*pe;
  document.getElementById('c10c_out').innerHTML = `
    <div class="result-headline">${fmt(value)}</div>
    <div class="result-sub">${L('القيمة العادلة بمقارنة P/E','Fair value (P/E comparison)')}</div>

}

  </div>
  ` + pageFoot();

function calc11_run(){
  const age = +document.getElementById('c11_age').value||0;
  const rage = +document.getElementById('c11_rage').value||0;
  const cs = +document.getElementById('c11_cs').value||0;
  const r = +document.getElementById('c11_r').value||0;
  const inc = +document.getElementById('c11_inc').value||0;
  const retYears = +document.getElementById('c11_yrs').value||1;
  const yearsToGo = Math.max(1, rage-age);

  const annualIncome = inc*12;
  const nestEgg4pct = annualIncome/0.04;
  const i = r/100/12;
  const nRet = retYears*12;
  const nestEggAnnuity = i===0 ? inc*nRet : inc*((1-Math.pow(1+i,-nRet))/i);
  const targetNestEgg = Math.min(nestEgg4pct, nestEggAnnuity*1.15 > nestEggAnnuity ? nestEggAnnuity : nestEggAnnuity);

  const n = yearsToGo*12;
  const futureOfCurrent = cs*Math.pow(1+i,n);
  const remaining = targetNestEgg - futureOfCurrent;
  const requiredPMT = remaining <= 0 ? 0 : (i===0 ? remaining/n : remaining / (((Math.pow(1+i,n)-1)/i)));

  document.getElementById('c11_out').innerHTML = `
    <div class="result-headline">${fmt(Math.max(requiredPMT,0),0)}</div>
    <div class="result-sub">${L('الاستثمار الشهري المطلوب حتى التقاعد','Required monthly investment until retirement')}</div>
    <div class="result-row"><span class="rl">${L('المبلغ المطلوب عند التقاعد (تقريبي)','Nest egg needed at retirement (approx.)')}</span><span class="rv">${fmt(targetNestEgg,0)}</span></div>
    <div class="result-row"><span class="rl">${L('القيمة المستقبلية لمدخراتك الحالية','Future value of current savings')}</span><span class="rv">${fmt(futureOfCurrent,0)}</span></div>
    <div class="result-row"><span class="rl">${L('سنين متبقية للتقاعد','Years left until retirement')}</span><span class="rv">${yearsToGo}</span></div>
    <div class="formula-box">${L('المبلغ المطلوب ≈ الدخل السنوي ÷ 0.04 (قاعدة الـ 4%)، ومقارن بقيمة معاش شهري لمدة سنين التقاعد.','Nest egg ≈ annual income ÷ 0.04 (the 4% rule), cross-checked against an annuity covering your retirement years.')}</div>`;
}

  return `<span class="type-badge ${isFund?'fund':''}">${isFund?ICON.fundIcon:ICON.stockIcon} ${isFund?L('صندوق','Fund'):L('سهم','Stock')}</span>`;
}

function c13_render(){
  c13_renderForm();
  let rows='', totalCost=0, totalValue=0;
  const chartData = [];
  c13_holdings.forEach((h,idx)=>{
    const cost = h.qty*h.buy, value = h.qty*h.cur, gain = value-cost;
    totalCost+=cost; totalValue+=value;
    chartData.push({name:h.name, value: Math.max(value,0)});
    rows += `<tr><td style="font-family:'Cairo',sans-serif">${esc(h.name)}</td><td>${c13_typeBadge(h.type)}</td><td>${fmt(h.qty,0)}</td><td>${fmt(h.buy)}</td><td>${fmt(h.cur)}</td><td>${fmt(cost,0)}</td><td>${fmt(value,0)}</td><td>${fmt(gain,0)}</td><td><button class="remove-x" onclick="c13_remove(${idx})">×</button></td></tr>`;
  });
  document.getElementById('c13_tbody').innerHTML = rows || `<tr><td colspan="9" style="text-align:center; color:var(--text-soft)">${L('لسه معندكش أسهم أو صناديق مضافة','No holdings added yet')}</td></tr>`;
  const totalGain = totalValue-totalCost;
  document.getElementById('c13_totals').innerHTML = `
    <div class="result-row"><span class="rl">${L('إجمالي التكلفة','Total cost')}</span><span class="rv">${fmt(totalCost,0)}</span></div>
    <div class="result-row"><span class="rl">${L('إجمالي القيمة الحالية','Total market value')}</span><span class="rv">${fmt(totalValue,0)}</span></div>
    <div class="result-row"><span class="rl">${L('صافي الربح/الخسارة','Net gain/loss')}</span><span class="rv">${fmt(totalGain,0)} (${pct(totalCost?totalGain/totalCost*100:0)})</span></div>`;

  document.getElementById('c13_chart').innerHTML = chartData.length ? c13_donut(chartData, totalValue) : '';
}

function c13_donut(data, total){
  const r = 72, cx = 90, cy = 90, sw = 30, circ = 2*Math.PI*r;
  let offset = 0;
  const segs = data.map((d,i)=>{
    const frac = total>0 ? d.value/total : 0;
    const dash = frac*circ;
    const color = C13_PALETTE[i % C13_PALETTE.length];
    const seg = `<circle r="${r}" cx="${cx}" cy="${cy}" fill="none" stroke="${color}" stroke-width="${sw}"
      stroke-dasharray="${dash.toFixed(2)} ${(circ-dash).toFixed(2)}" stroke-dashoffset="${(-offset).toFixed(2)}"
      transform="rotate(-90 ${cx} ${cy})" stroke-linecap="butt"><title>${esc(d.name)}</title></circle>`;
    offset += dash;
    return {seg, color, frac};
  });
  const svg = `<svg class="donut-svg" width="180" height="180" viewBox="0 0 180 180">
    <circle r="${r}" cx="${cx}" cy="${cy}" fill="none" stroke="var(--border)" stroke-width="${sw}"/>
    ${segs.map(s=>s.seg).join('')}
    <text x="${cx}" y="${cy-4}" text-anchor="middle" class="donut-center-value" style="fill:var(--text); font-size:15px">${fmt(total,0)}</text>
    <text x="${cx}" y="${cy+14}" text-anchor="middle" class="donut-center-label">${esc(L('إجمالي القيمة','TOTAL VALUE'))}</text>
  </svg>`;
  const legend = `<div class="legend">${data.map((d,i)=>`
    <div class="legend-item">
      <span class="legend-dot" style="background:${C13_PALETTE[i % C13_PALETTE.length]}"></span>
      <span class="legend-name">${esc(d.name)}</span>
      <span class="legend-pct">${pct(total>0? d.value/total*100 : 0, 1)}</span>
    </div>`).join('')}</div>`;
  return `<div class="result-sub" style="margin-bottom:4px">${L('توزيع المحفظة حسب القيمة الحالية','Portfolio allocation by market value')}</div>
    <div class="donut-wrap">${svg}${legend}</div>`;
}
PAGES.calc13.after = c13_render;

/* ===================== THEME / LANG / INIT ===================== */
function toggleTheme(){
  THEME = THEME === 'night' ? 'day' : 'night';
  document.documentElement.setAttribute('data-theme', THEME);
  document.getElementById('themeBtn').innerHTML = THEME === 'night' ? ICON.sun : ICON.moon;
}
function toggleLang(){
  LANG = LANG === 'ar' ? 'en' : 'ar';
  applyStaticLang();
  renderTicker();
  renderPage();
}
function applyStaticLang(){
  document.documentElement.setAttribute('lang', LANG);
  document.documentElement.setAttribute('dir', LANG==='ar' ? 'rtl':'ltr');
  document.querySelectorAll('[data-ar]').forEach(el=>{
    el.textContent = LANG==='ar' ? el.dataset.ar : el.dataset.en;
  });
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('themeBtn').innerHTML = ICON.moon;
  applyStaticLang();
  renderTicker();
  currentPage = location.hash.replace('#','') || 'home';
  renderPage();
});

</script>
